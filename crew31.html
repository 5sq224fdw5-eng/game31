<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📋 인트라넷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FFF9FC;--surface:#FFFFFF;--surface2:#FFF0E0;--border:#FFD6EA;
  --text:#2D1414;--text2:#A0566B;--text3:#C4A0B0;
  --accent:#FF85C1;--accent2:#FFB3D9;--peach:#FFE8F3;--cream:#FFF9FC;
  --green:#f87286;--red:#FF5C5C;--gold:#FFB347;--blue:#5B9BD5;
  --mint:#fde8eb;--minttext:#f87286;--brown:#C97A40;--beigebg:#FFF0E0;
  --sidebar:#2D1B14;--sidebar2:#3D2820;--sidebar3:#4D3830;
  --shadow:0 2px 16px rgba(255,127,110,0.1);--shadow2:0 6px 32px rgba(255,127,110,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
button,input,textarea,select{font-family:'Pretendard',sans-serif;}
button{cursor:pointer;}

/* ── 로그인 ── */
#loginPage{position:fixed;inset:0;z-index:999;background:url("https://res.cloudinary.com/dcmohbbyi/image/upload/q_auto/f_auto/v1779529932/IMG_2100_pgoqa5.png") center/cover no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:60px;overflow-y:auto;}
.login-profile-area{width:100%;display:flex;flex-direction:column;align-items:center;padding:24px 24px 12px;}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#FF85C1,#FFB3D9);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;box-shadow:0 8px 24px rgba(255,133,193,0.3);}
.login-title{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#FF85C1,#f87286);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-shadow:none;filter:drop-shadow(0 2px 4px rgba(255,133,193,0.3));}
.login-sub{font-size:13px;color:#333;font-weight:600;}
.login-card{width:100%;max-width:400px;background:white;border-top:1px solid var(--border);}
.login-sec{padding:22px 22px 16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.login-sec+.login-sec{border-top:1px solid rgba(255,255,255,0.2);}
.login-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;}
.fi{width:100%;padding:12px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);outline:none;transition:all 0.2s;box-sizing:border-box;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,127,110,0.1);}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:800;margin-top:10px;transition:all 0.15s;}
.login-btn.member{background:linear-gradient(135deg,#FF85C1,#f87286);color:white;box-shadow:0 4px 16px rgba(255,133,193,0.3);}
.login-btn.admin{background:linear-gradient(135deg,#FF85C1,#f87286);color:white;}
.login-btn:active{transform:scale(0.97);}

/* ── 앱 레이아웃 ── */
#app{display:flex;height:100vh;flex-direction:column;}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.main-header{background:#FF85C1;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-title{font-size:16px;font-weight:800;color:#fff;}
.main-header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:1px;}
.main-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── 탭바 ── */
.tab-bar{display:flex;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid var(--border);padding:8px 10px;gap:6px;flex-shrink:0;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-item{flex:0 0 auto;padding:7px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#FFF0E0;color:#C97A40;font-family:'Pretendard',sans-serif;white-space:nowrap;transition:all 0.15s;}
.tab-item.active{background:var(--group-color,#FF85C1);color:white;font-weight:700;}
.tab-item:hover:not(.active){background:#FFE8F3;color:#FF85C1;}
.sb-logo-text{display:none;}
.sb-user{display:flex;align-items:center;justify-content:center;}
.sb-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;position:relative;}
.sb-avatar.admin-av{background:linear-gradient(135deg,#FFB347,#FF9F7A);}
.online-dot{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#5DB88A;border:2px solid var(--sidebar);}
.sb-user-info{display:none;}
.sb-name{display:none;}
.sb-role{display:none;}
.sb-logout{display:none;}

/* 나가기 버튼 (아이콘) */
.sb-logout-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;width:100%;border:none;background:none;color:rgba(255,255,255,0.4);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.12s;}
.sb-logout-btn:hover{background:rgba(255,92,92,0.15);color:#FF9F7A;}
.sb-logout-btn span:first-child{font-size:18px;}

/* 메뉴 */
.sb-menu{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:none;}
.sb-menu::-webkit-scrollbar{display:none;}
.sb-section{padding:2px 0;}
.sb-section-label{display:none;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;width:60px;border-radius:0;cursor:pointer;transition:all 0.12s;color:rgba(255,255,255,0.55);font-size:10px;font-weight:600;border:none;background:none;position:relative;overflow:hidden;}
.sb-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);}
.sb-item.active{background:rgba(255,127,110,0.2);color:#FF9F7A;font-weight:700;}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.sb-item-icon{font-size:18px;}
.sb-badge{background:#FF5C5C;color:white;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}

/* 부서 서브메뉴 */
.sb-sub-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;width:60px;cursor:pointer;color:rgba(255,255,255,0.4);font-size:9px;font-weight:600;border:none;background:none;transition:all 0.12s;}
.sb-sub-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.04);}
.sb-sub-item.active{color:#FF9F7A;font-weight:700;}
.sb-dept-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* 오락실 버튼 */
.sb-game{margin:6px 6px;background:rgba(108,53,222,0.2);border:1px solid rgba(108,53,222,0.3);color:#A78BFA;padding:7px 4px;border-radius:8px;font-size:9px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;}
.sb-game:hover{background:rgba(108,53,222,0.3);}
.sb-game-icon{font-size:18px;}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.main-header{background:#FF85C1;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-title{font-size:16px;font-weight:800;color:#fff;}
.main-header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:1px;}
.main-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── 공통 컴포넌트 ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(45,27,20,0.9);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.active{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 0.2s;}
.overlay.active .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.fl{margin-bottom:12px;}
.fl label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn-pri{flex:1;padding:13px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;}
.btn-sec{flex:1;padding:13px;background:var(--surface2);color:var(--text2);border:none;border-radius:14px;font-size:15px;font-weight:700;}
.btn-sm{padding:8px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-sm.pri{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;}
.btn-sm.sec{background:var(--surface2);color:var(--text2);}
.card{background:white;border-radius:16px;border:1px solid var(--border);margin:0 14px 12px;overflow:hidden;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.stitle{font-size:14px;font-weight:800;color:var(--text2);padding:0 16px 8px;}

/* ── 투표 카드 ── */
.vopt{position:relative;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:white;margin-bottom:6px;transition:all 0.15s;cursor:pointer;overflow:hidden;-webkit-user-select:none;min-height:46px;box-sizing:border-box;}
.vopt.closed{cursor:default;}
.vopt.selected{border-color:var(--accent);background:rgba(255,127,110,0.06);}
.vopt:not(.closed):not(.selected):active{background:var(--cream);}
.vbar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,127,110,0.08);transition:width 0.4s;z-index:0;border-radius:12px;pointer-events:none;}
.vopt-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;z-index:1;transition:all 0.15s;}
.vopt.selected .vopt-chk{background:var(--accent);border-color:var(--accent);}
.vopt-label{flex:1;font-size:14px;font-weight:600;color:var(--text);z-index:1;}
.vopt-cnt{font-size:12px;font-weight:700;color:var(--text3);z-index:1;}
.vbtn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.vbtn.edit{background:rgba(91,155,213,0.1);color:var(--blue);}
.vbtn.copy{background:rgba(255,179,71,0.1);color:var(--gold);}
.vbtn.close{background:rgba(255,92,92,0.1);color:var(--red);}
.vbtn.open{background:rgba(93,184,138,0.1);color:var(--green);}
.vbtn.del{background:rgba(255,92,92,0.08);color:var(--red);}
.vbtn.reset{background:rgba(255,179,71,0.1);color:var(--gold);}
.voted-badge{background:rgba(93,184,138,0.1);color:var(--green);font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;}
.closed-badge{background:rgba(100,100,100,0.12);color:#888;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;text-align:center;border:1px solid rgba(100,100,100,0.15);}
.link-list{border-top:1px solid var(--border);padding:10px 16px;}
.link-list-title{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;}
.link-item{padding:5px 0;border-bottom:1px solid var(--surface2);}
.link-num-name{font-size:12px;font-weight:700;}
.link-url a{font-size:11px;color:var(--blue);word-break:break-all;}
.link-form{padding:10px 16px;border-top:1px solid var(--border);}
.vadmin{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap;}

/* ── 캘린더 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px 12px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 12px 4px;}
.cal-dh{text-align:center;font-size:11px;font-weight:700;color:var(--text3);}
.cal-cell{min-height:36px;border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:3px;cursor:pointer;transition:background 0.1s;}
.cal-cell:hover{background:var(--cream);}
.cal-cell.today .cal-dn{background:var(--accent);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:var(--peach);border-radius:8px;}
.cal-cell.selected .cal-dn{color:#FF85C1;font-weight:800;}
.cal-dn{font-size:12px;font-weight:600;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-dn.sun{color:var(--red);}
.cal-dn.sat{color:var(--blue);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:1px;}

/* ── 채팅 ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;}
.msg-row.me{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.msg-content{display:flex;flex-direction:column;gap:3px;max-width:70%;}
.msg-row.me .msg-content{align-items:flex-end;}
.msg-name{font-size:11px;font-weight:700;color:var(--text3);padding:0 4px;}
.msg-bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg-bubble.other{background:white;border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(255,127,110,0.08);}
.msg-bubble.me{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px;}
.msg-date-sep{text-align:center;font-size:11px;color:var(--text3);padding:10px 0 4px;font-weight:600;}
.chat-room-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.chat-room-item:hover{background:var(--cream);}
.chat-room-item.active{background:rgba(255,127,110,0.07);}
.chat-room-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;flex-shrink:0;}

/* ── 멤버 리스트 ── */
.member-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,220,210,0.3);transition:background 0.1s;}
.member-item:hover{background:var(--cream);}
.member-avatar{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0;position:relative;}
.member-online-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:#5DB88A;border:2px solid white;}

/* ── 피드 카드 ── */
.feed-card{background:white;border-radius:16px;margin:0 14px 12px;box-shadow:0 2px 12px rgba(255,127,110,0.08);border:1px solid rgba(255,210,200,0.5);overflow:hidden;}
.feed-card-header{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(255,220,210,0.4);}
.feed-card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.feed-card-footer{display:flex;border-top:1px solid rgba(255,220,210,0.4);}
.feed-footer-btn{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;background:none;border:none;cursor:pointer;}
.feed-footer-btn:not(:last-child){border-right:1px solid rgba(255,220,210,0.4);}

/* ── 설정 ── */
.setting-section{padding:16px;}
.setting-section+.setting-section{border-top:8px solid var(--bg);}
.setting-section-title{font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

</head>
<body>
<div class="toast" id="toast"></div>

<!-- ══ LOGIN ══ -->
<div id="loginPage">
  <div style="width:100%;max-width:400px;margin:0 auto;display:flex;flex-direction:column;align-items:center;padding:10px 20px 20px;position:relative;z-index:1">
    <!-- 상단 로고/타이틀 -->
    <div style="margin-bottom:28px">
      <div style="width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,133,193,0.4);display:flex;align-items:center;justify-content:center;">
          <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
            <text x="80" y="68" text-anchor="middle"
              font-family="'Noto Sans KR','Pretendard',sans-serif"
              font-size="38" font-weight="900"
              fill="#FF85C1">떠리원</text>
            <text x="80" y="96" text-anchor="middle"
              font-family="'Noto Sans KR','Pretendard',sans-serif"
              font-size="16" font-weight="900"
              fill="#FF85C1">인트라넷</text>
          </svg>
      </div>
    </div>
    <!-- 로그인 카드 -->
    <div style="width:100%;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(255,133,193,0.2)">
      <div style="display:flex">
        <button id="tabMember" onclick="switchLoginTab('member')" style="flex:1;padding:14px;border:none;background:#FF85C1;color:white;font-size:14px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif">👤 사원</button>
        <button id="tabAdmin" onclick="switchLoginTab('admin')" style="flex:1;padding:14px;border:none;background:#FFF0E0;color:#C97A40;font-size:14px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif">🔑 인사팀</button>
      </div>
      <div id="loginSectionMember" class="login-sec">
        <div class="login-label">닉네임을 입력하세요</div>
        <input class="fi" id="loginName" placeholder="닉네임 입력" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeyup="if(event.key==='Enter')doLogin('member')">
        <button class="login-btn member" onclick="doLogin('member')">입장하기</button>
      </div>
      <div id="loginSectionAdmin" class="login-sec" style="display:none">
        <div class="login-label">비밀번호를 입력하세요</div>
        <input class="fi" id="loginPw" type="password" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin('admin')">
        <button class="login-btn admin" onclick="doLogin('admin')">입장하기</button>
      </div>

function urlBase64ToUint8(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

function forceReload(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      Promise.all(regs.map(r=>r.unregister())).then(()=>{
        caches.keys().then(keys=>{
          Promise.all(keys.map(k=>caches.delete(k))).then(()=>{
            window.location.replace(window.location.pathname+'?v='+Date.now());
          });
        });
      });
    });
  } else {
    window.location.replace(window.location.pathname+'?v='+Date.now());
  }
}

// ── 자동 투표 스케줄러 ──
async function checkAutoVote(){
  if(CU?.role!=='admin')return;
  const schedule = await dbGet('autoVoteSchedule');
  if(!schedule||!schedule.enabled)return;

  const now = new Date();
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const todayStr2 = now.toISOString().slice(0,10);
  const tomorrow = new Date(now.getTime() + 24*60*60*1000);
  const tomorrowStr2 = tomorrow.toISOString().slice(0,10);
  const dateLabel = `${now.getMonth()+1}월 ${now.getDate()}일`;

  for(const [gid, sch] of Object.entries(schedule.groups||{})){
    if(!sch.enabled) continue;

    // 시작 투표 자동 생성
    if(sch.startTime && hhmm === sch.startTime){
      const lastKey = `autoVoteDone_start_${gid}_${todayStr2}`;
      if(localStorage.getItem(lastKey)) continue;
      const gData = groups[gid]||{};
      const opts = ['오늘 출근할게요 (참여)','오늘 연차 쓸게요 (프패)','열정페이 (봉사)','재능기부 (노피드)','오늘 일당 두배닷✨ (투피드)'];
      await dbPush('votes',{title:`${dateLabel} 업무(참여) 시작`,group:gid,date:todayStr2,time:sch.startCloseTime||'22:00',options:opts,createdAt:Date.now()});
      localStorage.setItem(lastKey,'1');
      showToast(`🗳️ ${gData.name} 시작 투표 자동 생성됨`);
      loadHome();
    }

    // 완료 투표 자동 생성
    if(sch.endTime && hhmm === sch.endTime){
      const lastKey = `autoVoteDone_end_${gid}_${todayStr2}`;
      if(localStorage.getItem(lastKey)) continue;
      const gData = groups[gid]||{};
      const opts = ['퇴근할게요 (완료)','열정페이 (봉사)','재능기부 (노피드)','오늘 일당 두배닷✨ (투피드)'];
      await dbPush('votes',{title:`${dateLabel} 업무 완료`,group:gid,date:tomorrowStr2,time:sch.endCloseTime||'13:00',options:opts,createdAt:Date.now()});
      localStorage.setItem(lastKey,'1');
      showToast(`🗳️ ${gData.name} 완료 투표 자동 생성됨`);
      loadHome();
    }
  }
}

function startAutoVoteScheduler(){
  setInterval(checkAutoVote, 60000); // 1분마다 체크
  checkAutoVote();
}

async function loadGroups(){

function renderGroupSelectBar(){
  const bar = document.getElementById('groupSelectInner');
  if(!bar) return;

  // 그룹 탭 보이기/숨기기
  document.querySelectorAll('.group-only').forEach(b=>{
    b.style.display = _currentDept ? '' : 'none';
  });
  const mainTabBar = document.getElementById('mainTabBar');
  if(mainTabBar) mainTabBar.style.display = _currentDept ? '' : 'none';

  // 그룹 선택됐는데 현재 탭이 group-only가 아니면 공지로
  if(!_currentDept && ['home','chat','members'].includes(_currentTab)){
    _currentTab = 'notice';
    document.querySelectorAll('.tab-item').forEach(b=>b.classList.toggle('active', b.dataset&&b.dataset.tab==='notice'));
    loadNoticePage();
  }

  const groupColor = _currentDept ? (groups[_currentDept]?.color||'#FF85C1') : '#FF85C1';

  // CSS 변수만 변경 - 인라인 스타일 건드리지 않음
  document.documentElement.style.setProperty('--group-color', groupColor);

  let html = '';
  const allActive = !_currentDept;
  html += `<button onclick="selectGroup('all')" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:${allActive?'#FF85C1':'#f8f0f5'};color:${allActive?'white':'#999'}">전체</button>`;
  // order 필드 기준 정렬, 없으면 키 순
  const sortedGroups = Object.entries(groups).sort((a,b)=>{
    const oa = a[1].order ?? 999;
    const ob = b[1].order ?? 999;
    return oa - ob;
  });
  sortedGroups.forEach(([gid,g])=>{
    const active = _currentDept===gid;
    const locked = (g.groupLock && CU?.role!=='admin' && !localStorage.getItem('groupUnlocked_'+gid));
    html += `<button onclick="selectGroup('${gid}')" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:${active?(g.color||'#FF85C1'):'#f8f0f5'};color:${active?'white':'#999'}">${locked?'🔒 ':''}${escH(g.name)}</button>`;
  });
  bar.innerHTML = html;
}

  localStorage.setItem('lastGroup',gid);

    _currentChatRoom = null;
    clearInterval(window._chatPoll);
    document.querySelectorAll('.tab-item').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
    _currentDept = null;
    _currentTab='notice';
    document.querySelectorAll('[data-tab="notice"]').forEach(b=>b.classList.add('active'));

    loadNoticePage();
    return;

}

async function loadNoticePage(){
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';

  const notices=await dbGet('notices');
  const noticeComments=await dbGet('noticeComments');
  _cachedData.notices=notices;_cachedData.noticeComments=noticeComments;

  const list=notices?Object.entries(notices).filter(([k,n])=>{
    if(n.deleted) return false;
    if(!_currentDept) return !n.group || n.group==='all'; // 그룹 미선택: 전체 공지만
    return !n.group || n.group==='all' || n.group===_currentDept; // 그룹 선택: 전체+해당 그룹
  }).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)):[];

  let html='<div style="padding:14px 0 80px">';

  // 관리자 버튼 영역
  if(isAdmin){
    html+=`<div style="padding:0 14px 12px;display:flex;gap:8px">`;
    html+=`<button onclick="openNoticeModal('feed')" style="flex:1;background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">📢 공지 작성</button>`;
    html+=`<button onclick="goTab('home')" style="flex:1;background:#fde8eb;color:#f87286;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🗳️ 투표 만들기</button>`;
    html+=`</div>`;
  }

  if(list.length===0){
    mb.innerHTML=html+'<div class="empty"><div class="empty-icon">📭</div>공지가 없습니다</div></div>';
    return;
  }

  list.forEach(([nid,n])=>{ html+=renderNoticeCard(nid,n,noticeComments); });
  html+='</div>';
  mb.innerHTML=html;
}

function renderNoticeCard(nid,n,allComments){
  const isAdmin=CU?.role==='admin';
  const comments=allComments?.[nid];
  const commentList=comments?Object.values(comments).sort((a,b)=>(a.time||0)-(b.time||0)):[];
  const isExpanded=_expandedNotice===nid;
  const body=n.body||'';
  const preview=body.length>80?body.slice(0,80)+'...':body;

  let html=`<div class="feed-card">`;
  html+=`<div class="feed-card-header">`;
  html+=`<div class="feed-card-icon" style="background:linear-gradient(135deg,#FFB347,#FF9F7A)">📢</div>`;
  html+=`<div style="flex:1;min-width:0">`;
  html+=`<div style="font-size:15px;font-weight:800;color:var(--text)">${escH(n.title||'')}</div>`;
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDate(n.createdAt)}${n.createdBy?' · '+escH(n.createdBy):''}</div>`;
  html+=`</div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openNoticeEditById('${nid}')">✏️</button>`;
    html+=`<button class="vbtn del" onclick="delNotice('${nid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div>`;

  // 본문
  html+=`<div style="padding:12px 14px;font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;cursor:pointer" onclick="toggleNoticeExpand('${nid}')">${escH(isExpanded?body:preview)}</div>`;
  if(body.length>80){
    html+=`<div style="padding:0 14px 8px"><button onclick="toggleNoticeExpand('${nid}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700">${isExpanded?'접기 ▲':'더보기 ▼'}</button></div>`;
  }

  // 댓글
  if(commentList.length>0){
    html+=`<div style="padding:8px 14px;border-top:1px solid var(--border)">`;
    commentList.forEach(cm=>{
      html+=`<div style="padding:5px 0;display:flex;gap:6px;align-items:flex-start">`;
      html+=`<div style="width:22px;height:22px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0">${(cm.name||'?')[0]}</div>`;
      html+=`<div><span style="font-size:12px;font-weight:700;color:var(--accent)">${escH(cm.name||'')}</span> <span style="font-size:13px">${escH(cm.body||'')}</span>`;
      html+=`<div style="font-size:10px;color:var(--text3)">${fmtDate(cm.time)}</div></div></div>`;
    });
    html+=`</div>`;
  }

  // 댓글 입력 (사원)
  if(!isAdmin){
    html+=`<div style="display:flex;gap:6px;padding:8px 10px 10px;border-top:1px solid var(--border)">`;
    html+=`<input id="cmtInput_${nid}" class="fi" placeholder="댓글..." style="flex:1;padding:8px 12px;font-size:13px">`;
    html+=`<button class="btn-sm pri" onclick="submitComment('${nid}')">등록</button>`;
    html+=`</div>`;
  }

  html+=`</div>`;
  return html;
}

  _expandedNotice=(_expandedNotice===nid)?null:nid;
  loadNoticePage();

// ── 채팅 입장 상태: sessionStorage로 탭 이동해도 유지 ──
function getChatPath(room){
  if(!room)return null;
  if(room.type==='all')return 'chat';
  if(room.type==='dept')return `chat_dept/${room.id}`;
  return `chat_dm/${[CU?.name||CU?.key,room.id].sort().join('_')}`;
}
function getRoomKey(room){
  if(!room)return null;
  return room.type==='all'?'all':room.type==='dept'?'dept_'+room.id:'dm_'+[CU?.name||CU?.key,room.id].sort().join('_');
}
function isJoined(room){return localStorage.getItem('chatJoined_'+getRoomKey(room))==='1';}
function setJoined(room,v){
  const k='chatJoined_'+getRoomKey(room);
  if(v)localStorage.setItem(k,'1');else localStorage.removeItem(k);
}

// 메시지 롱프레스 메뉴
let _pressTimer=null;
let _msgMenuMid=null;

function showMsgMenu(mid,x,y){
  _msgMenuMid=mid;
  // 기존 메뉴 제거
  document.getElementById('msgCtxMenu')?.remove();
  const isAdmin=CU?.role==='admin';
  const menu=document.createElement('div');
  menu.id='msgCtxMenu';
  menu.style=`position:fixed;z-index:999;background:#2D1B14;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,0.35);overflow:hidden;min-width:160px;`;
  // 좌표: 화면 벗어나지 않게
  const mx=Math.min(x,window.innerWidth-170);
  const my=Math.min(y,window.innerHeight-160);
  menu.style.left=mx+'px';menu.style.top=my+'px';

  const items=[
    {icon:'📋',label:'복사',fn:`copyMsgText('${mid}')`},
    ...(isAdmin?[
      {icon:'🙈',label:'가리기',fn:`hideMsg('${mid}')`},
      {icon:'🗑️',label:'삭제',fn:`deleteChat('${mid}')`,red:true},
    ]:[]),
  ];
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.style=`display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:none;border:none;color:${item.red?'#FF5C5C':'rgba(255,255,255,0.85)'};font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06);`;
    btn.innerHTML=`<span>${item.icon}</span><span>${item.label}</span>`;
    btn.onclick=()=>{menu.remove();eval(item.fn);};
    menu.appendChild(btn);
  });

  // 바깥 클릭하면 닫힘
  setTimeout(()=>document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h);},{once:true}),10);
}

async function loadChatMemberPanel(){
  const listEl=document.getElementById('chatMemberList');
  if(!listEl||!_currentChatRoom)return;
  const room=_currentChatRoom;
  let members=[];
  if(room.type==='dept'){
    // 부서 채팅: chat_presence에서 현재 접속자
    const presence=await dbGet(`chat_presence/${getRoomKey(room)}`);
    if(presence){
      members=Object.values(presence).filter(p=>p&&p.name).map(p=>({name:p.name,online:true}));
    }
    // 오락실 멤버에서 이 그룹 멤버도 표시
    const gameMembers=await gameGet('members');
    if(gameMembers){
      const gName=groups[room.id]?.name||'';
      Object.values(gameMembers).forEach(m=>{
        if(!m.name)return;
        const clean=m.name.replace(/^\*/,'');
        if(!clean.startsWith(gName))return;
        const nick=clean.replace(gName,'');
        if(!members.find(x=>x.name===nick)){
          members.push({name:nick,online:false});
        }
      });
    }
  } else {
    // 전체 채팅: crew31 멤버
    const crewMembers=await dbGet('members');
    if(crewMembers){
      const presence=await dbGet(`chat_presence/${getRoomKey(room)}`)||{};
      const onlineNames=new Set(Object.values(presence).map(p=>p?.name).filter(Boolean));
      members=Object.values(crewMembers).filter(m=>m.name).map(m=>({name:m.name,online:onlineNames.has(m.name)}));
    }
  }
  members.sort((a,b)=>{
    if(a.online&&!b.online)return -1;
    if(!a.online&&b.online)return 1;
    return a.name.localeCompare(b.name,'ko');
  });
  listEl.innerHTML=members.map(m=>`
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <div style="width:28px;height:28px;border-radius:8px;background:${m.online?'#FF85C1':'var(--surface2)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${m.online?'white':'var(--text3)'};">${(m.name||'?')[0]}</div>
      <span style="font-size:12px;font-weight:600;color:${m.online?'var(--text)':'var(--text3)'}">${escH(m.name)}</span>
      ${m.online?'<span style="width:6px;height:6px;border-radius:50%;background:#5DB88A;flex-shrink:0"></span>':''}
    </div>
  `).join('');
}

async function joinChat(){
if(!_currentChatRoom)return;
const pw=document.getElementById('chatPwInput')?.value||'';
// 채팅방 비번 확인 (부서 잠금 비번과 동일)
if(_currentChatRoom.type==='dept'){
const g=groups[_currentChatRoom.id];
if(g?.lock&&g.lock!==pw){showToast('비밀번호가 틀렸습니다');return;}
}else if(_currentChatRoom.type==='all'){
// 전체 채팅: 별도 비번 없음 (빈 칸으로 입장 가능)
}
// 입장 처리
setJoined(_currentChatRoom,true);
// 입장 시스템 메시지 발송
const path=getChatPath(_currentChatRoom);
await dbPush(path,{
body:`${CU.name}님이 입장했습니다`,
senderName:'시스템',senderKey:'system',senderRole:'system',
time:Date.now(),system:true
});
// presence 등록
await dbSet(`chat_presence/${getRoomKey(_currentChatRoom)}/${CU.key||'admin'}`,{name:CU.name,active:true,time:Date.now()});
loadChatTab();
}

async function leaveChat(){

const path=getChatPath(_currentChatRoom);

await dbPush(path,{
body:`${CU.name}님이 퇴장했습니다`,
senderName:'시스템',senderKey:'system',senderRole:'system',
time:Date.now(),system:true
});

loadChatTab();
}

async function fetchChatMessages(){
const el=document.getElementById('chatMessages');
if(!el||!_currentChatRoom)return;
const path=getChatPath(_currentChatRoom);
const msgs=await dbGet(path);
window._currentMsgData=msgs||{};

if(!msgs){
el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">아직 메시지가 없어요</div>';
return;
}

const list=Object.entries(msgs)
.filter(([k,m])=>!m.deleted)
.sort((a,b)=>(a[1].time||0)-(b[1].time||0));

// 뱃지 처리
const badge=document.getElementById('chatBadge');
const isOnChat=_currentTab==='chat';
if(!isOnChat&&list.length>_lastChatCount&&_lastChatCount>0){
const diff=list.length-_lastChatCount;
if(badge){badge.style.display='';badge.textContent=diff>99?'99+':diff;}
}
if(isOnChat&&badge)badge.style.display='none';
_lastChatCount=list.length;

const wasAtBottom=el.scrollHeight-el.scrollTop-el.clientHeight<80;
const isAdmin=CU?.role==='admin';
let html='';let lastDate='';

list.forEach(([mid,m])=>{
// 시스템 메시지
if(m.system){
html+=`<div style="text-align:center;padding:4px 0"><span style="font-size:11px;color:var(--text3);background:rgba(200,180,175,0.15);padding:4px 12px;border-radius:20px">${escH(m.body||'')}</span></div>`;
return;
}
const isMe=(CU?.role==='admin'&&m.senderRole==='admin')||(m.senderKey&&m.senderKey===CU?.key)||(m.senderName&&m.senderName===CU?.name);
const d=new Date(m.time||0);
const dateStr=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
const timeStr=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
if(dateStr!==lastDate){html+=`<div class="msg-date-sep">${dateStr}</div>`;lastDate=dateStr;}
const avColor=m.senderRole==='admin'?'linear-gradient(135deg,#FFB347,#FF9F7A)':'linear-gradient(135deg,#FF9F7A,#FF7F6E)';

html+=`<div class="msg-row ${isMe?'me':''}" id="msg_${mid}">`;
if(!isMe)html+=`<div class="msg-avatar" style="background:${avColor};cursor:default">${(m.senderName||'?')[0]}</div>`;
html+=`<div class="msg-content">`;
if(!isMe)html+=`<div class="msg-name">${escH(m.senderName||'')}${m.senderRole==='admin'?' 👑':''}</div>`;
// 롱프레스 / 우클릭으로 메뉴
html+=`<div class="msg-bubble ${isMe?'me':'other'}"
  oncontextmenu="event.preventDefault();showMsgMenu('${mid}',event.clientX,event.clientY)"
  ontouchstart="_pressTimer=setTimeout(()=>showMsgMenu('${mid}',event.touches[0].clientX,event.touches[0].clientY),600)"
  ontouchend="clearTimeout(_pressTimer)"
  ontouchmove="clearTimeout(_pressTimer)"
>${highlightMentions(m.body||'')}</div>`;
html+=`<div class="msg-time">${timeStr}</div>`;
html+=`</div></div>`;

});
el.innerHTML=html;
if(wasAtBottom)el.scrollTop=el.scrollHeight;
}

async function sendChat(){
const inp=document.getElementById('chatInput');
const body=inp?.value.trim();
if(!body||!_currentChatRoom)return;
inp.value='';inp.style.height='';
const msg={body,senderName:CU.name,senderKey:CU.key||'admin',senderRole:CU.role,time:Date.now()};
const path=getChatPath(_currentChatRoom);
await dbPush(path,msg);
await new Promise(r=>setTimeout(r,300));
await fetchChatMessages();

// @all 처리 - 전체 알림
if(body.includes('@all')){
  sendFCMNotification({
    title:`💬 ${CU.name}님의 전체 멘션`,
    body:body.replace('@all','').trim().slice(0,60)||'전체 멘션',
    data:{tab:'chat'}
  });
}

function chatKeydown(e){
  // 멘션 팝업에서 키 처리
  const popup=document.getElementById('mentionPopup');
  if(popup&&popup.style.display!=='none'){
    if(e.key==='Escape'){popup.style.display='none';return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}

function chatInputHandler(el){
  autoResize(el);
  // @ 멘션 감지
  const val=el.value;
  const cursor=el.selectionStart;
  const textBefore=val.slice(0,cursor);
  const atIdx=textBefore.lastIndexOf('@');
  const popup=document.getElementById('mentionPopup');
  if(!popup)return;
  if(atIdx===-1||(atIdx>0&&!/\s/.test(textBefore[atIdx-1])&&textBefore[atIdx-1])){
    // @ 없거나 @ 앞에 공백이 없으면 팝업 닫기
    const hasAt=atIdx!==-1&&(atIdx===0||/\s/.test(textBefore[atIdx-1]));
    if(!hasAt){popup.style.display='none';return;}
  }
  const query=textBefore.slice(atIdx+1).toLowerCase();
  showMentionPopup(query, atIdx, el);
}

async function showMentionPopup(query, atIdx, input){
  const popup=document.getElementById('mentionPopup');
  if(!popup)return;

  // 현재 채팅방 멤버 목록
  let names=[];
  if(_currentChatRoom?.type==='dept'){
    const gameMembers=await gameGet('members');
    if(gameMembers){
      const gName=groups[_currentChatRoom.id]?.name||'';
      Object.values(gameMembers).forEach(m=>{
        if(!m.name)return;
        const clean=m.name.replace(/^\*/,'');
        if(!clean.startsWith(gName))return;
        names.push(clean.replace(gName,''));
      });
    }
  } else {
    const crewMembers=await dbGet('members');
    if(crewMembers) names=Object.values(crewMembers).filter(m=>m.name).map(m=>m.name);
  }

  const filtered=names.filter(n=>n.toLowerCase().includes(query));
  // @all 포함
  const allOption = query===''||'all'.includes(query) ? ['all'] : [];
  const finalList=[...allOption,...filtered];
  if(finalList.length===0){popup.style.display='none';return;}

  popup.style.display='block';
  popup.innerHTML=finalList.map(name=>`
    <div onclick="insertMention('${escH(name)}',${atIdx})" style="padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='white'">
      <div style="width:26px;height:26px;border-radius:8px;background:#FF85C1;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">${name[0]}</div>
      @${escH(name)}
    </div>
  `).join('');
}

function insertMention(name, atIdx){
  const input=document.getElementById('chatInput');
  if(!input)return;
  const val=input.value;
  const cursor=input.selectionStart;
  const before=val.slice(0,atIdx);
  const after=val.slice(cursor);
  input.value=before+'@'+name+' '+after;
  input.focus();
  const newPos=atIdx+name.length+2;
  input.setSelectionRange(newPos,newPos);
  const popup=document.getElementById('mentionPopup');
  if(popup)popup.style.display='none';
  autoResize(input);
}


function highlightMentions(text){
  if(!text) return '';
  return escH(text).replace(/@(\S+)/g, (match, name) => {
    if(name==='all') return `<span style="background:#FF85C1;color:white;padding:1px 6px;border-radius:8px;font-weight:700">@all</span>`;

  });
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}

  const allItems=[];
  document.querySelectorAll('[id^="glist_"] > div > div').forEach(el=>{

}

          html+=`</div>`;
          html+=`</div>`;
          html+=`<span style="font-size:11px;padding:4px 12px;border-radius:10px;font-weight:700;`;

          html+=`</span>`;

        });
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  html+='</div>';
  mb.innerHTML=html;
}

// 연차 빠른 지급/차감
async function quickLeave(gameKey,name,days){
  const cur=await gameGet(`memberLeave/${gameKey}`)||0;
  const next=Math.max(0,cur+days);
  await gameSet(`memberLeave/${gameKey}`,next);
  showToast(`${name}: 연차 ${days>0?'+':''}${days}일 → ${next}일`);
  loadLeave();
}

// 연차 직접 입력
async function customLeave(gameKey,name){
  const input=prompt(`${name}의 연차 변경\n현재: ${await gameGet(`memberLeave/${gameKey}`)||0}일\n변경할 일수를 입력하세요 (예: +2, -1, 5)`);
  if(!input)return;
  const num=parseFloat(input.replace('+',''));
  if(isNaN(num)){showToast('올바른 숫자를 입력하세요');return;}
  const isRelative=input.startsWith('+')||input.startsWith('-');
  const cur=await gameGet(`memberLeave/${gameKey}`)||0;
  const next=isRelative?Math.max(0,cur+num):Math.max(0,num);
  await gameSet(`memberLeave/${gameKey}`,next);
  showToast(`${name}: 연차 → ${next}일`);
  loadLeave();
}

// 경품 빠른 지급
async function quickPrize(gameKey,name,emoji,prizeName){
  const raw=await gameGet(`memberPrizes/${gameKey}`);
  const arr=Array.isArray(raw)?[...raw]:(raw?Object.values(raw):[]);
  arr.push({emoji,name:prizeName,time:Date.now(),deducted:false,memo:''});
  await gameSet(`memberPrizes/${gameKey}`,arr);
  showToast(`✅ ${name}에게 ${emoji}${prizeName} 지급!`);
  loadLeave();
}

// 경품 직접 입력
async function customPrize(gameKey,name){
  const emoji=prompt(`${name}에게 지급할 경품 이모지를 입력하세요\n예: 🎁 ☕ 🍕`)||'🎁';
  const prizeName=prompt(`경품 이름을 입력하세요`);
  if(!prizeName)return;
  await quickPrize(gameKey,name,emoji.trim(),prizeName.trim());
}

async function togglePrizeUsed(memberKey, prizeIdx, newDeducted){
  if(CU?.role!=='admin')return;
  const raw=await gameGet(`memberPrizes/${memberKey}`);
  const arr=Array.isArray(raw)?raw:(raw?Object.values(raw):[]);
  if(!arr[prizeIdx])return;
  const today=new Date().toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\.\s*/g,'.').slice(0,-1);
  arr[prizeIdx]={...arr[prizeIdx],deducted:newDeducted,deductDate:newDeducted?today:null};
  await gameSet(`memberPrizes/${memberKey}`,arr);
  showToast(newDeducted?'✅ 사용완료 처리':'↩️ 미사용으로 변경');
  loadLeave();
}

async function confirmGroupLock(){
  const pw=document.getElementById('lockPwInput').value;
  if(!pw){showToast('비밀번호를 입력하세요');return;}
  const action=_lockAction;if(!action)return;
  const {gid}=action;

  if(action.action==='enter'&&action.type==='groupEntry'){
    if(groups[gid]?.groupLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    localStorage.setItem('groupUnlocked_'+gid,'1');
    closeGroupLockModal();
    selectGroup(gid);
  }else if(action.type==='groupEntrySet'){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    await dbSet(`groups/${gid}/groupLock`,pw);
    groups[gid].groupLock=pw;
    showToast(action.action==='change'?'🔑 비번 변경됨':'🔐 진입 잠금 설정됨');
    closeGroupLockModal();loadSettings();
  }else if(action.type==='groupEntryUnlock'){
    if(groups[gid]?.groupLock!==pw){showToast('비밀번호가 틀렸습니다');return;}

let _calGroup = 'all'; // 선택된 캘린더 그룹

async function renderCalendar(){
  if(!calY||!calM&&calM!==0){
    calY=new Date().getFullYear();
    calM=new Date().getMonth();
    calSel=calSel||new Date().toISOString().slice(0,10);
  }
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';
  const y=calY,m=calM;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  // 공지 이벤트 + 출석 데이터 동시 로드 (전체 한 번에)
  const [evts, allAttendance] = await Promise.all([
    dbGet('calEvents'),
    dbGet('attendance')  // 관리자/사원 모두 전체 로드 (캐시 효율)
  ]);
  const evList=Object.entries(evts||{}).filter(([k,e])=>!e.deleted);

  const monthStr = `${y}-${String(m+1).padStart(2,'0')}`;
  const dateAttMap = {};

  if(allAttendance){
    Object.entries(allAttendance).forEach(([gid, weeks])=>{
      const gname = groups[gid]?.name || gid;
      // 그룹 필터 적용
      if(_calGroup !== 'all' && gid !== _calGroup) return;
      Object.entries(weeks).forEach(([wk, members])=>{
        Object.entries(members).forEach(([mname, dates])=>{
          if(!isAdmin && mname !== CU?.name) return;
          Object.entries(dates).forEach(([date, result])=>{
            if(!date.startsWith(monthStr)) return;
            if(!dateAttMap[date]) dateAttMap[date]=[];
            dateAttMap[date].push({name:mname, result, group:gname, gid});
          });
        });
      });
    });
  }

  const resultColor={'완료':'#5DB88A','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b'};

  let html='<div style="padding-bottom:60px">';
  // 그룹 필터 탭
  html+=`<div style="display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none">`;
  html+=`<button onclick="setCalGroup('all')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${_calGroup==='all'?'#FF85C1':'#FFE8F3'};color:${_calGroup==='all'?'white':'#FF85C1'}">전체</button>`;
  Object.entries(groups).forEach(([gid,g])=>{
    const isActive = _calGroup===gid;
    html+=`<button onclick="setCalGroup('${gid}')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${isActive?'#f87286':'#fde8eb'};color:${isActive?'white':'#f87286'}">${escH(g.name)}</button>`;
  });
  html+=`</div>`;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px">`;
  html+=`<button onclick="calNav(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">‹</button>`;
  html+=`<div style="font-size:16px;font-weight:800">${y}년 ${m+1}월</div>`;
  html+=`<button onclick="calNav(1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">›</button>`;
  html+=`</div>`;
  html+=`<div class="cal-head">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    html+=`<div class="cal-dh" style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'}">${d}</div>`;
  });
  html+=`</div>`;
  html+=`<div class="cal-grid">`;
  for(let i=0;i<first;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===calSel;
    const dayEvts=evList.filter(([k,e])=>e.date===ds);
    const dayAtt=dateAttMap[ds]||[];
    const dow=(first+d-1)%7;
    html+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" onclick="calSelect('${ds}')">`;
    html+=`<div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>`;
    if(dayEvts.length) html+=`<div class="cal-dot"></div>`;
    // 출석 도트 (결과 색상으로)
    if(dayAtt.length>0){
      if(!isAdmin){
        // 사원: 본인 결과 색상 도트
        const r=dayAtt[0]?.result||'';
        const c=resultColor[r]||'var(--accent)';
        html+=`<div style="width:6px;height:6px;border-radius:50%;background:${c};margin:1px auto"></div>`;
      } else {
        // 관리자: 참여 인원수
        html+=`<div style="font-size:9px;color:var(--accent);font-weight:700;text-align:center">${dayAtt.length}명</div>`;
      }
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 선택 날짜 상세
  if(calSel){
    const selEvts=evList.filter(([k,e])=>e.date===calSel);
    const selAtt=dateAttMap[calSel]||[];
    html+=`<div style="padding:0 14px 10px">`;
    html+=`<div style="font-size:13px;font-weight:800;color:var(--text2);margin:8px 0">${calSel}</div>`;

    // 출석 내역
    if(selAtt.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">📋 출석 현황</div>`;
      if(!isAdmin){
        // 사원: 본인 결과만
        selAtt.forEach(a=>{
          const c=resultColor[a.result]||'#ccc';
          html+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:${c}22;border-radius:10px;margin:0 4px 4px 0">`;
          html+=`<span style="font-size:12px;font-weight:700;color:${c}">${a.result}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3)">${a.group}</span>`;
          html+=`</div>`;
        });
      } else {
        // 관리자: 그룹별 집계
        const byGroup={};
        selAtt.forEach(a=>{
          if(!byGroup[a.group]) byGroup[a.group]={};
          if(!byGroup[a.group][a.result]) byGroup[a.group][a.result]=[];
          byGroup[a.group][a.result].push(a.name);
        });
        Object.entries(byGroup).forEach(([gname, results])=>{
          const gid = Object.keys(groups).find(id=>groups[id].name===gname);
          const gcolor = groups[gid]?.color || '#FF85C1';
          const totalCount = Object.values(results).reduce((s,n)=>s+n.length,0);
          html+=`<div style="margin-bottom:10px;background:white;border-radius:12px;padding:10px 12px;border:1px solid var(--border)">`;
          html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">`;
          html+=`<span style="width:8px;height:8px;border-radius:50%;background:${gcolor};display:inline-block"></span>`;
          html+=`<span style="font-size:12px;font-weight:800">${gname}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3);margin-left:auto">총 ${totalCount}명</span>`;
          html+=`</div>`;
          Object.entries(results).forEach(([result, names])=>{
            const c=resultColor[result]||'#ccc';
            html+=`<div style="margin-bottom:6px">`;
            html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">`;
            html+=`<span style="background:${c}22;color:${c};padding:2px 8px;border-radius:8px;font-weight:700;font-size:11px">${result} ${names.length}명</span>`;
            html+=`</div>`;
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
            names.forEach(name=>{
              html+=`<span style="background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${escH(name)}</span>`;
            });
            html+=`</div></div>`;
          });
          html+=`</div>`;
        });
      }
    }

    // 공지 이벤트
    if(selEvts.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin:8px 0 6px">📢 일정</div>`;
      selEvts.forEach(([eid,e])=>{
        html+=`<div style="background:white;border-radius:12px;padding:10px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">`;
        html+=`<div><div style="font-size:14px;font-weight:700">${escH(e.title||'')}</div>`;
        if(e.desc)html+=`<div style="font-size:11px;color:var(--text3)">${escH(e.desc)}</div>`;
        html+=`</div>`;
        if(isAdmin)html+=`<button class="vbtn del" onclick="delCalEvent('${eid}')">🗑</button>`;
        html+=`</div>`;
      });
    }

    if(selEvts.length===0&&selAtt.length===0){
      html+=`<div style="font-size:13px;color:var(--text3);padding:8px 0">일정 없음</div>`;
    }

    if(isAdmin){
      html+=`<div style="margin-top:8px;display:flex;gap:8px">`;
      html+=`<input id="calEvtTitle" class="fi" placeholder="일정 제목" style="flex:1;padding:8px 12px">`;
      html+=`<button class="btn-sm pri" onclick="addCalEvent()">추가</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+='</div>';
  mb.innerHTML=html;
}

// 해당 월의 주 월요일 키 목록
function getMonthWeekKeys(y, m){
  const keys=new Set();
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    keys.add(getWeekKey(ds));
  }
  return [...keys];
}

// ── DEPT PAGE ──

async function loadDeptPage(gid){
  try{
  const mb=document.getElementById('mainBody');
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const isAdmin=CU?.role==='admin';
  const votes=await dbGet('votes');
  const list=votes
    ?Object.entries(votes)
      .filter(([k,v])=>!v.deleted&&(v.group===gid||v.group==='all'))
      .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0))
    :[];
  let html='<div style="padding:14px 0 80px">';
  if(isAdmin){
    html+=`<div style="padding:0 14px 10px;display:flex;gap:8px">`;
    html+=`<button onclick="openVoteModal(null,'${gid}','start')" style="flex:1;background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌅 업무 시작</button>`;
    html+=`<button onclick="openVoteModal(null,'${gid}','end')" style="flex:1;background:#f87286;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌙 업무 완료</button>`;
    html+=`</div>`;
  }
  if(list.length===0){
    mb.innerHTML=html+'<div class="empty"><div class="empty-icon">📋</div>이 부서의 투표가 없습니다</div></div>';return;
  }
  list.forEach(([vid2,v2])=>{
    const isClosed2 = v2.closed||(v2.date&&v2.time&&Date.now()>new Date(v2.date+'T'+v2.time).getTime());
    const resCount = v2.imageUpload 
      ? Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url!=='연차';}).length + Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url==='연차';}).length
      : Object.keys(v2.responses||{}).length;
    const isEnd2 = (v2.title||'').includes('완료')||v2.imageUpload;
    const badge = isEnd2 ? '🌙' : '🌅';
    html+=`<div style="background:white;border-radius:14px;margin:0 14px 8px;overflow:hidden;border:1px solid var(--border)">`;
    html+=`<div onclick="toggleVoteDetail('${vid2}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer">`;
    html+=`<div style="flex:1;min-width:0">`;
    html+=`<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${badge} ${escH(v2.title||'')}</div>`;
    html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${isClosed2?'🔒 마감':'⏰ 진행중'} · ${resCount}명 참여 · ${v2.date||''}</div>`;
    html+=`</div><span style="color:var(--text3);font-size:12px;margin-left:8px">▼</span>`;
    html+=`</div>`;
    html+=`<div id="voteDetail_${vid2}" style="display:none;border-top:1px solid var(--border)"></div>`;
    html+=`</div>`;
  });
  html+='</div>';
  mb.innerHTML=html;
  }catch(e){console.error('loadDeptPage error',e);mb.innerHTML='<div style="padding:20px;color:red">오류: '+e.message+'</div>';}
}

async function toggleVoteDetail(vid){
  const el = document.getElementById(`voteDetail_${vid}`);
  if(!el) return;
  if(el.style.display==='none'){
    el.style.display='block';
    el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
    const v = await dbGet(`votes/${vid}`);
    try{ el.innerHTML = await renderVoteCard(vid, v); }
    catch(e){ el.innerHTML=`<div style="padding:10px;color:red">오류: ${e.message}</div>`; }
  } else {
    el.style.display='none';
  }
}

// ══════════════════════════════════════════════
// ── VOTE CARD ──
// ══════════════════════════════════════════════
async function renderVoteCard(vid,v){
  try {
  const isAdmin=CU?.role==='admin';
  const opts=v.options||[];
  const responses=v.responses||{};
  const myKey=CU?.name||CU?.key||'admin'; // 이름 기반
  const myVote=responses[myKey];
  const totalVotes=Object.keys(responses).length;
  const now=Date.now();
  const deadline=(v.date&&v.time)?new Date(v.date+'T'+v.time).getTime():0;
  const isClosed=v.closed||(deadline&&now>deadline);
  const gName=v.group==='all'?'전체':(groups[v.group]?.name||v.group||'전체');
  const gColor=groups[v.group]?.color||'var(--accent)';
  const isEndVote = (v.title||'').includes('완료') || (v.title||'').includes('마감') || v.imageUpload===true;
  const isImageVote = v.imageUpload === true;

  let html=`<div class="card" style="margin:0 14px 16px;${isClosed?'opacity:0.75;background:#f8f8f8;':''}">` ;
  html+=`<div style="padding:14px 14px 10px;border-bottom:1px solid var(--border)">`;
  html+=`<div style="display:flex;align-items:flex-start;gap:8px">`;
  html+=`<div style="flex:1">`;
  html+=`<div style="font-size:15px;font-weight:800">${escH(v.title||'')}</div>`;
  // 시작/완료 배지
  const titleLow = (v.title||'').toLowerCase();
  if(titleLow.includes('시작')||titleLow.includes('start')){
    html+=`<span style="background:#FFE8F3;color:#FF85C1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌅 업무시작</span>`;
  } else if(titleLow.includes('완료')||titleLow.includes('end')||titleLow.includes('퇴근')){
    html+=`<span style="background:#fde8eb;color:#f87286;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌙 업무완료</span>`;
  }
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:3px">`;
  html+=`<span style="background:${gColor}22;color:${gColor};padding:2px 8px;border-radius:10px;font-weight:700;margin-right:6px">${escH(gName)}</span>`;
  if(v.date)html+=`📅 ${v.date}`;
  if(v.time)html+=` ${v.time} 마감`;
  html+=`</div></div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openVoteModal('${vid}')">✏️</button>`;
    html+=`<button class="vbtn ${isClosed?'open':'close'}" onclick="toggleVoteClose('${vid}',${!isClosed})">${isClosed?'열기':'닫기'}</button>`;
    html+=`<button class="vbtn del" onclick="delVote('${vid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div></div>`;
  html+=`<div style="padding:12px 14px">`;

  if(isImageVote){
    // 이미지 업로드 투표 - 시작 투표 참여자 버튼 목록
    const allImages = v.images||{};

    // 같은 날짜 시작 투표 찾기
    let startVoters = [];
    let leaveSet = new Set();
    let bonusSet = new Set();
    let totalCount = 0;
    try{
      const allVotes = await dbGet('votes');
      if(allVotes && v.group){
        const titleDate = getTitleDate(v);
        const startV = Object.values(allVotes).find(sv=>{
          if(sv.deleted||sv.group!==v.group) return false;
          if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('참여')) return false;
          const t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
          const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
          if(t1&&t2) return t1[1]===t2[1]&&t1[2]===t2[2];
          return getTitleDate(sv)===titleDate;
        });
        if(startV){
          const svOpts=startV.options||[];
          const svResp=startV.responses||{};
          startVoters = Object.keys(svResp);
          startVoters.forEach(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            if(opt.includes('프패')||opt.includes('연차')||opt.includes('프리패스')) leaveSet.add(nick);
            else if(opt.includes('봉사')||opt.includes('열정페이')) bonusSet.add(nick);
          });
          // 총 인증 수 = 열정페이/봉사 제외, 투피드는 2장
          const tupideSet = new Set(startVoters.filter(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            return opt.includes('투피드')||opt.includes('두배');
          }));
          totalCount = startVoters.filter(nick=>!bonusSet.has(nick)).reduce((sum,nick)=>{
            return sum + (tupideSet.has(nick) ? 2 : 1);
          }, 0);
        }
      }
    }catch(e){}

    if(startVoters.length===0){
      startVoters = Object.keys(allImages);
    }
    if(totalCount===0) totalCount = startVoters.length;

    html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0">`;
    startVoters.forEach((nick, idx)=>{
      const isLeave = leaveSet.has(nick);
      const sanitizedNick = nick.replace(/[\.#$\/\[\]\s]/g, '_');
      const imgs = (allImages[sanitizedNick]||allImages[nick]||[]).filter(img=>img?.url&&img.url!=='연차');
      const uploadCount = imgs.length;
      const collapseId = `imgCollapse_${vid}_${idx}`;
      const isBonus = bonusSet.has(nick);
      let fillPct, label, btnStyle, canUpload;
      if(isLeave){
        fillPct = 100;
        label = '(연차)';
        btnStyle = `background:#FFB347;color:white;border:1.5px solid #FFB347;`;
        canUpload = false;
      } else if(isBonus){
        fillPct = totalCount>0 ? Math.min(100, Math.round(uploadCount/totalCount*100)) : 0;
        label = `열정페이 (${uploadCount}/${totalCount})`;
        btnStyle = fillPct===100
          ? `background:#94a3b8;color:white;border:1.5px solid #94a3b8;`
          : fillPct===0
            ? `background:transparent;color:#94a3b8;border:1.5px solid #94a3b8;`
            : `background:linear-gradient(to right,#94a3b8 ${fillPct}%,transparent ${fillPct}%);color:${fillPct>50?'white':'#94a3b8'};border:1.5px solid #94a3b8;`;
        canUpload = true;
      } else {
        fillPct = totalCount>0 ? Math.min(100, Math.round(uploadCount/totalCount*100)) : 0;
        label = `(${uploadCount}/${totalCount})`;
        btnStyle = fillPct===100
          ? `background:#FF85C1;color:white;border:1.5px solid #FF85C1;`
          : fillPct===0
            ? `background:transparent;color:#FF85C1;border:1.5px solid #FF85C1;`
            : `background:linear-gradient(to right,#FF85C1 ${fillPct}%,transparent ${fillPct}%);color:${fillPct>50?'white':'#FF85C1'};border:1.5px solid #FF85C1;`;
        canUpload = true;
      }

      html+=`<div>`;
      html+=`<button onclick="toggleNickBtn('${vid}','${collapseId}','${nick.replace(/'/g,'\\\'')}')" style="width:100%;padding:8px 4px;border-radius:20px;${btnStyle}font-size:11px;font-weight:700;cursor:pointer;line-height:1.5;text-align:center">`;
      html+=`${escH(nick)}<br><span style="font-size:9px">${label}</span>`;
      html+=`</button>`;
      html+=`<div id="${collapseId}" style="display:none;margin-top:6px">`;
      const isMe = nick===myKey || nick===(CU?.name||'');
      if(isMe && !isClosed && canUpload){
        html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
        if(uploadCount>0){
          html+=`<div style="display:flex;gap:4px;margin-bottom:6px">`;
          html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="flex:1;background:var(--surface2);color:var(--text2);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:700;cursor:pointer">수정</button>`;
          html+=`<button onclick="deleteMyImages('${vid}')" style="padding:6px 8px;background:rgba(255,92,92,0.1);color:var(--red);border:none;border-radius:8px;font-size:11px;cursor:pointer">🗑️</button>`;
          html+=`</div>`;
        } else {
          html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="width:100%;background:#FF85C1;color:white;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px">📎 업로드</button>`;
        }
      }
      if(imgs.length>0){
        const sorted = [...imgs].sort((a,b)=>(a.uploadedAt||0)-(b.uploadedAt||0));
        html+=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">`;
        sorted.forEach(img=>{
          const thumbUrl = img.url.includes('/upload/') ? img.url.replace('/upload/','/upload/q_auto,f_auto,w_400/') : img.url;
          html+=`<div style="aspect-ratio:9/16;border-radius:8px;overflow:hidden;cursor:pointer" onclick="window.open('${img.url}','_blank')"><img src="${thumbUrl}" loading="lazy" style="width:100%;height:100%;object-fit:cover"></div>`;
        });
        html+=`</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;

  } else if(!v.imageUpload) {
    // 일반 투표만
    opts.forEach((opt,i)=>{
      const cnt=Object.values(responses).filter(r=>r===i).length;
      const pct=totalVotes?Math.round(cnt/totalVotes*100):0;
      const isMe=myVote===i;
      const canVote=!isClosed;
      const onclickAttr=canVote?`onclick="castVote('${vid}',${i})"`:'';
      html+=`<div class="vopt${isMe?' selected':''}${isClosed?' closed':''}" ${onclickAttr}>`;
      html+=`<div class="vbar" style="width:${pct}%"></div>`;
      html+=`<div class="vopt-chk">${isMe?'✓':''}</div>`;
      html+=`<div class="vopt-label">${escH(opt)}</div>`;
      html+=`<div class="vopt-cnt">${cnt}명 ${pct}%</div>`;
      html+=`</div>`;
      // 모든 사용자에게 선택지별 투표자 이름 표시
      if(cnt > 0){
        const voterNames = Object.entries(responses).filter(([k,rv])=>rv===i).map(([k])=>k);
        html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;padding:2px 8px 8px">`;
        voterNames.forEach(name=>{ html+=`<span style="background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`; });
        html+=`</div>`;
      }
    });
    if(myVote!==undefined&&!isClosed){
      html+=`<div style="text-align:center;margin-top:8px;display:flex;gap:8px;justify-content:center"><span class="voted-badge">✅ ${escH(opts[myVote]||'')} · 선택 변경 가능</span><button onclick="cancelVote('${vid}')" style="font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:white;color:var(--text3);cursor:pointer">취소</button></div>`;
    }
    if(isClosed){
      html+=`<div style="text-align:center;margin-top:8px"><span class="closed-badge">🔒 마감 · 총 ${totalVotes}명 참여</span></div>`;
      if(isAdmin && v.group && v.group!=='all'){
        const allGroupMembers = await dbGet('members');
        if(allGroupMembers){
          const votedNames = Object.keys(responses);
          const isEndVote2 = (v.title||'').includes('완료') || v.imageUpload;

          // 미투표자 (이 투표에 아예 안 한 사람)
          const nonVoters = Object.values(allGroupMembers)
            .filter(m=>m.name && !votedNames.includes(m.name))
            .map(m=>m.name);

          html+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">`;

          // 완료 미제출 먼저 (완료 투표일 때만)
          if(isEndVote2){
            const allVotes = await dbGet('votes');
            if(allVotes){
              // 같은 날짜, 같은 그룹의 시작 투표 찾기
              const startVote = Object.values(allVotes).find(sv=>
                !sv.deleted &&
                sv.group===v.group &&
                sv.date===v.date &&
                (sv.title||'').includes('시작') &&
                sv.responses
              );
              if(startVote){
                const startedNames = Object.keys(startVote.responses||{});
                const mismatch = startedNames.filter(n=>!votedNames.includes(n));
                if(mismatch.length>0){
                  html+=`<div style="padding:10px 12px;background:#FFF8E1;border-radius:12px;border:1px solid #FFE082">`;
                  html+=`<div style="font-size:11px;font-weight:700;color:#F9A825;margin-bottom:6px">🔔 완료 미제출 ${mismatch.length}명</div>`;
                  html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
                  mismatch.forEach(name=>{
                    html+=`<span style="background:rgba(249,168,37,0.1);color:#F9A825;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`;
                  });
                  html+=`</div></div>`;
                }
              }
            }
          }

          // 미투표자 - 드롭다운으로
          if(nonVoters.length>0){
            const dropId = `nonVoter_${vid}`;
            html+=`<div style="padding:10px 12px;background:#FFF0F0;border-radius:12px;border:1px solid #FFD6D6">`;
            html+=`<div onclick="toggleNonVoterDrop('${dropId}')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">`;
            html+=`<span style="font-size:11px;font-weight:700;color:#FC5C65">⚠️ 미투표 ${nonVoters.length}명</span>`;
            html+=`<span id="${dropId}_arrow" style="font-size:12px;color:#FC5C65">▸</span>`;
            html+=`</div>`;
            html+=`<div id="${dropId}" style="display:none;margin-top:6px;display:none">`;
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
            nonVoters.forEach(name=>{
              html+=`<span style="background:rgba(252,92,101,0.1);color:#FC5C65;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`;
