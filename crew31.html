          } else {
            html+=`<div style="text-align:center;font-size:12px;color:var(--green)">✅ 전원 투표 완료</div>`;
          }

          html+=`</div>`;
        }
      }
    }
  }

  // 링크 제출 섹션
  const canSubmitLink = !isClosed && !isEndVote;
  const myOptText = myVote!==undefined ? (opts[myVote]||'') : '';
  const isTupide = myOptText.toLowerCase().includes('투피드') || myOptText.includes('두배');

  if(!isEndVote){
  html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">`;



  html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">🔗 링크 제출</div>`;

  // 열정페이(봉사)/재능기부(노피드) 선택자 자동 표시
  const bonusVoters=[];
  if(v.responses && v.options){
    Object.entries(v.responses).forEach(([k,optIdx])=>{
      const optText=(v.options[optIdx]||'').toLowerCase();
      if(optText.includes('봉사')||optText.includes('열정페이')||optText.includes('노피드')||optText.includes('재능기부')){
        bonusVoters.push({nick:k, type:optText.includes('봉사')||optText.includes('열정페이')?'열정페이':'재능기부'});
      }
    });
  }
  if(bonusVoters.length>0){
    bonusVoters.forEach(b=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">`;
      html+=`<span style="font-size:12px;font-weight:700;min-width:60px">${escH(b.nick)}</span>`;
      html+=`<span style="font-size:12px;color:var(--text3)">${escH(b.type)}</span>`;
      html+=`</div>`;
    });
  }

  // 링크 시간순 정렬 (time 없으면 pushId 순)
  const rawLinks = v.links ? Object.entries(v.links) : [];
  const sortedLinks = rawLinks.sort((a,b)=>{
    const ta = a[1].time||0, tb = b[1].time||0;
    if(ta&&tb) return ta-tb;
    return a[0]<b[0]?-1:1; // pushId 알파벳순 = 시간순
  }).map(([,l])=>l);
  if(sortedLinks.length>0 || bonusVoters.length>0){
    // 닉네임 기준으로 그룹핑 (투피드 2개 링크 묶기)
    const grouped = {};
    sortedLinks.forEach(l=>{
      const nick = l.nick||'';
      if(!grouped[nick]) grouped[nick] = {nick, links:[], firstTime: l.time||0};
      grouped[nick].links.push(l);
    });
    // 연차 포함 전체 목록 (시간순)
    const allEntries = [
      ...bonusVoters.map(b=>({type:'bonus', nick:b.nick, label:b.type, time:0})),
      ...Object.values(grouped).map(g=>({type:'link', nick:g.nick, links:g.links, time:g.firstTime}))
    ].sort((a,b)=>a.time-b.time);
    let num=1;
    allEntries.forEach(entry=>{
      if(entry.type==='bonus'){
        html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">`;
        html+=`<span style="font-size:11px;color:var(--text3);min-width:20px">${num++}.</span>`;
        html+=`<span style="font-size:12px;font-weight:700;min-width:60px;flex-shrink:0">${escH(entry.nick)}</span>`;
        html+=`<span style="font-size:12px;color:var(--text3)">${escH(entry.label)}</span>`;
        html+=`</div>`;
      } else {
        html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border)">`;
        // 첫 번째 링크에서 닉네임/아이디/배지
        const firstLink = entry.links[0];
        const linkType = firstLink.type||'normal';
        const badgeText = linkType==='tupide'?'투피드':linkType==='bonus'?'열정페이':linkType==='leave'?'연차':'';
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">`;
        html+=`<div style="display:flex;align-items:center;gap:4px">`;
        html+=`<span style="font-size:11px;color:var(--text3)">${num++}.</span>`;
        html+=`<span style="font-size:13px;font-weight:700">${escH(firstLink.nick||'')}</span>`;
        if(firstLink.id) html+=`<span style="font-size:12px;color:var(--text3)">@${escH(firstLink.id)}</span>`;
        html+=`</div>`;
        if(badgeText) html+=`<span style="background:${linkType==='tupide'?'#FF85C1':linkType==='leave'?'#FFB347':'#94a3b8'};color:white;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700">${badgeText}</span>`;
        html+=`</div>`;
        entry.links.forEach(l=>{
          html+=`<div style="margin-bottom:2px">`;
          html+=`<a href="${escH(l.url||'')}" target="_blank" style="font-size:12px;color:var(--accent);word-break:break-all">${escH(l.url||'')}</a>`;
          html+=`</div>`;
          if(l.note) html+=`<div style="font-size:11px;color:var(--text3)">ㄴ${escH(l.note)}</div>`;
        });
        html+=`</div>`;
      }
    });
  }else if(bonusVoters.length===0 && sortedLinks.length===0){
    html+=`<div style="font-size:12px;color:var(--text3);margin-bottom:6px">아직 제출된 링크가 없습니다</div>`;
  }
  if(canSubmitLink){
    // 드롭박스 + @아이디 + 링크 + 메모 구조
    html+=`<div style="margin-top:10px">`;
    html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
    html+=`<select id="linkType_${vid}" onchange="onLinkTypeChange('${vid}')" style="padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<option value="">선택 안함</option>`;
    html+=`<option value="normal">노피드</option>`;
    html+=`<option value="bonus">열정페이</option>`;
    html+=`<option value="leave">연차</option>`;
    html+=`<option value="tupide">투피드</option>`;
    html+=`</select>`;
    html+=`<input id="linkId_${vid}" placeholder="@아이디" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`</div>`;
    html+=`<div id="linkInputArea_${vid}">`;
    html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
    html+=`<input id="linkUrl_${vid}" placeholder="https://..." style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<input id="linkNote_${vid}" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`</div>`;
    html+=`</div>`;
    html+=`<div id="linkInputArea2_${vid}" style="display:none">`;
    html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
    html+=`<input id="linkUrl_${vid}_1" placeholder="링크 1" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<input id="linkNote_${vid}_1" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`</div>`;
    html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
    html+=`<input id="linkUrl_${vid}_2" placeholder="링크 2" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<input id="linkNote_${vid}_2" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`</div>`;
    html+=`</div>`;
    html+=`<button onclick="submitVoteLinkNew('${vid}')" style="width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🔗 링크 제출</button>`;
    html+=`</div>`;
  }
  // 관리자 일괄복사 + 댓글
  if(sortedLinks.length>0){
    html+=`<button onclick="copyAllLinks('${vid}')" style="width:100%;margin-top:6px;padding:8px;background:var(--surface2);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2)">📋 링크 전체 복사</button>`;
  }
  // 관리자 댓글
  const adminComment = v.adminComment||'';
  if(isAdmin){
    html+=`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">`;
    html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px">🔧 관리자 메모</div>`;
    html+=`<div style="display:flex;gap:6px">`;
    html+=`<input id="adminComment_${vid}" value="${escH(adminComment)}" placeholder="관리자 메모 입력..." style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<button onclick="saveAdminComment('${vid}')" style="padding:8px 12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">저장</button>`;
    html+=`</div></div>`;
  } else if(adminComment){
    html+=`<div style="margin-top:8px;padding:8px 12px;background:rgba(255,133,193,0.08);border-radius:8px;border-left:3px solid #FF85C1">`;
    html+=`<div style="font-size:11px;color:var(--text3);margin-bottom:2px">🔧 관리자 메모</div>`;
    html+=`<div style="font-size:13px;color:var(--text)">${escH(adminComment)}</div>`;
    html+=`</div>`;
  }
  html+=`</div>`; // border-top div 닫기
  } // isEndVote 조건 끝
  // 템플릿 멤버 참여 현황
  if(v.tplMembers && v.tplMembers.length>0){
    const voters = Object.keys(v.responses||{});
    const linkerNicks = [...new Set(Object.values(v.links||{}).map(l=>l.nick).filter(Boolean))];
    html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding:10px 14px">`;
    html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">참여 현황</div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
    v.tplMembers.forEach(n=>{
      const hasVote = voters.includes(n);
      const hasLink = linkerNicks.includes(n);
      const done = hasVote || hasLink;
      html+=`<span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;${done?'background:var(--accent);color:white;':'background:transparent;color:var(--text3);border:1.5px solid var(--border);'}">${escH(n)}</span>`;
    });
    html+=`</div></div>`;
  }

  // 시작 투표 - 관리자에게 투표+링크 현황 표시
  if(!isEndVote && isAdmin && v.group){
    try{
      const voters = Object.keys(v.responses||{});
      const linkers = Object.keys(v.links||{}).map(k=>k.replace(/_[12]$/,'')); // 투피드 _1, _2 제거
      const linkerNicks = [...new Set(Object.values(v.links||{}).map(l=>l.nick).filter(Boolean))];
      const allParticipants = [...new Set([...voters, ...linkerNicks])];
      if(allParticipants.length>0){
        html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding:10px 14px">`;
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">참여 현황 (투표+링크)</div>`;
        html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
        allParticipants.forEach(n=>{
          const hasVote = voters.includes(n);
          const hasLink = linkerNicks.includes(n);
          const both = hasVote && hasLink;
          const bg = both ? 'background:var(--accent);color:white;' : 'background:rgba(255,133,193,0.15);color:var(--accent);border:1.5px solid var(--accent);';
          const tag = both ? '' : (hasVote ? ' 투표만' : ' 링크만');
          html+=`<span style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;${bg}">${escH(n)}${tag}</span>`;
        });
        html+=`</div></div>`;
      }
    }catch(e){}
  }

  html+=`</div></div>`;
  return html;
  } catch(e) {
    console.error('renderVoteCard error', vid, e);
    const opts2=v.options||[];
    const responses2=v.responses||{};
    let fb=`<div class="card" style="margin:0 14px 16px;padding:14px">`;
    fb+=`<div style="font-size:15px;font-weight:800;margin-bottom:8px">${escH(v.title||'투표')}</div>`;
    fb+=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">📅 ${v.date||''} · 마감 ${v.time||''} · ${Object.keys(responses2).length}명 참여</div>`;
    opts2.forEach((o,i)=>{
      const cnt=Object.values(responses2).filter(r=>r===i).length;
      const names=Object.entries(responses2).filter(([k,r])=>r===i).map(([k])=>k);
      fb+=`<div style="padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:13px">${escH(o)} <span style="color:var(--text3)">${cnt}명</span>`;
      if(names.length>0) fb+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${names.map(n=>`<span style="background:white;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(n)}</span>`).join('')}</div>`;
      fb+=`</div>`;
    });
    fb+=`</div>`;
    return fb;
  }
}

function onLinkTypeChange(vid){
  const type = document.getElementById(`linkType_${vid}`)?.value;
  const area1 = document.getElementById(`linkInputArea_${vid}`);
  const area2 = document.getElementById(`linkInputArea2_${vid}`);
  if(!area1||!area2) return;
  if(type==='tupide'){
    area1.style.display='none';
    area2.style.display='block';
  } else {
    area1.style.display='block';
    area2.style.display='none';
  }
}

async function submitVoteLinkNew(vid){
  const nick=CU?.name||'익명';
  const key=CU?.key||'admin';
  const type=document.getElementById(`linkType_${vid}`)?.value||'normal';
  const linkId=document.getElementById(`linkId_${vid}`)?.value.trim()||'';
  const displayNick=nick;
  const displayId=linkId;
  const isTupide=type==='tupide';

  if(isTupide){
    const url1=document.getElementById(`linkUrl_${vid}_1`)?.value.trim();
    const note1=document.getElementById(`linkNote_${vid}_1`)?.value.trim()||'';
    const url2=document.getElementById(`linkUrl_${vid}_2`)?.value.trim();
    const note2=document.getElementById(`linkNote_${vid}_2`)?.value.trim()||'';
    if(!url1&&!url2){showToast('링크를 입력하세요');return;}
    if(url1){
      const ex1=await dbGet(`votes/${vid}/links/${key}_1`);
      await dbSet(`votes/${vid}/links/${key}_1`,{nick:displayNick,id:displayId,url:cleanUrl(url1),note:note1,type,time:ex1?.time||Date.now()});
    }
    if(url2){
      const ex2=await dbGet(`votes/${vid}/links/${key}_2`);
      await dbSet(`votes/${vid}/links/${key}_2`,{nick:displayNick,id:displayId,url:cleanUrl(url2),note:note2,type,time:ex2?.time||(Date.now()+1)});
    }
  } else {
    const url=document.getElementById(`linkUrl_${vid}`)?.value.trim();
    const note=document.getElementById(`linkNote_${vid}`)?.value.trim()||'';
    if(!url){showToast('URL을 입력하세요');return;}
    const ex=await dbGet(`votes/${vid}/links/${key}`);
    await dbSet(`votes/${vid}/links/${key}`,{nick:displayNick,id:displayId,url:cleanUrl(url),note,type,time:ex?.time||Date.now()});
  }
  showToast('✅ 링크 제출됨!');
  if(_currentTab==='home')loadHome();
  else if(_currentTab==='dept')loadDeptPage(_currentDept);
}

async function submitVoteLink(vid, isTupide=false){
  const nick=CU?.name||'익명';
  const key=CU?.key||'admin';
  const linkId=document.getElementById(`linkId_${vid}`)?.value.trim()||'';
  const displayNick = linkId || nick;
  if(isTupide){
    const url1=document.getElementById(`linkUrl_${vid}_1`)?.value.trim();
    const note1=document.getElementById(`linkNote_${vid}_1`)?.value.trim()||'';
    const url2=document.getElementById(`linkUrl_${vid}_2`)?.value.trim();
    const note2=document.getElementById(`linkNote_${vid}_2`)?.value.trim()||'';
    if(!url1&&!url2){showToast('링크를 입력하세요');return;}
    if(url1){
      const existing1 = await dbGet(`votes/${vid}/links/${key}_1`);
      await dbSet(`votes/${vid}/links/${key}_1`,{nick:displayNick,url:cleanUrl(url1),note:note1,time:existing1?.time||Date.now()});
    }
    if(url2){
      const existing2 = await dbGet(`votes/${vid}/links/${key}_2`);
      await dbSet(`votes/${vid}/links/${key}_2`,{nick:displayNick,url:cleanUrl(url2),note:note2,time:existing2?.time||(Date.now()+1)});
    }
  } else {
    let url=document.getElementById(`linkUrl_${vid}`)?.value.trim();
    const note=document.getElementById(`linkNote_${vid}`)?.value.trim()||'';
    if(!url){showToast('URL을 입력하세요');return;}
    const existing = await dbGet(`votes/${vid}/links/${key}`);
    await dbSet(`votes/${vid}/links/${key}`,{nick:displayNick,url:cleanUrl(url),note,time:existing?.time||Date.now()});
  }
  showToast('✅ 링크 제출됨!');
  if(_currentTab==='home')loadHome();
  else if(_currentTab==='dept')loadDeptPage(_currentDept);
}

function cleanUrl(url){
  url=url.replace(/instagram\.com\/reel\//,'instagram.com/p/');
  url=url.replace(/\?.*$/,'');
  if(!url.endsWith('/'))url+='/';
  return url;
}

async function deleteMyImages(vid){
  if(!confirm('업로드한 사진을 전부 삭제할까요?')) return;
  const myKey = (CU?.name||'').replace(/[\.\#\$\/\[\]\s]/g,'_');
  await dbDelete(`votes/${vid}/images/${myKey}`);
  // 출석 기록도 삭제
  const v = await dbGet(`votes/${vid}`);
  if(v && v.group && v.date){
    const attDate = getTitleDate(v);
    const mondayStr = getWeekKey(attDate);
    await dbDelete(`attendance/${v.group}/${mondayStr}/${CU?.name||myKey}/${attDate}`);
  }
  showToast('🗑️ 사진 삭제됨');
  if(_currentTab==='home')loadHome();
  else if(_currentTab==='dept')loadDeptPage(_currentDept);
}

async function toggleNickBtn(vid, collapseId, nick){
  const el = document.getElementById(collapseId);
  if(!el) return;
  if(el.style.display !== 'none'){
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  // Firebase에서 최신 이미지 읽기
  const myKey = (CU?.name||'').replace(/[\.#$\/\[\]\s]/g,'_');
  const sanitized = nick.replace(/[\.#$\/\[\]\s]/g,'_');
  const imgs = await dbGet(`votes/${vid}/images/${sanitized}`) || await dbGet(`votes/${vid}/images/${myKey}`) || [];
  const realImgs = imgs.filter(img=>img?.url&&img.url!=='연차');
  const isMe = nick===(CU?.name||'') || sanitized===myKey;
  const v = await dbGet(`votes/${vid}`);
  const isClosed = v?.closed||false;

  let html = '';
  if(isMe && !isClosed && realImgs.length===0){
    html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;

    html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;

// ── Cloudinary 이미지 업로드 ──
const CLOUDINARY_CLOUD = 'dcmohbbyi';
const CLOUDINARY_PRESET = 'crew31_upload'; // unsigned preset 이름

async function uploadImages(vid, input){
  const files = Array.from(input.files);
  if(!files.length) return;
  showToast('⏳ 업로드 중...');

  const myKey = (CU?.name || '').replace(/[\.\#\$\/\[\]\s]/g, '_');
  if(!myKey){showToast('로그인 정보 오류');return;}

  // 만료 시간 계산 (다음날 오후 1시 10분)
  const now = new Date();
  const expire = new Date(now);
  if(now.getHours() >= 22){
    expire.setDate(expire.getDate() + 1);
  }
  expire.setHours(13, 10, 0, 0);
  const expireAt = expire.getTime();

  const uploaded = [];
  const uploadOne = async (file, retry=0) => {
    if(file.size > 10 * 1024 * 1024){ showToast(`${file.name} 10MB 초과`); return null; }
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('folder', `crew31/${vid}`);
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 30000);
    try{
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {method:'POST', body:fd, signal:controller.signal});
      clearTimeout(timeout);
      const data = await res.json();
      if(data.secure_url){
        const optimUrl = data.secure_url.replace('/upload/','/upload/q_auto,f_auto,w_600/');
        return {url:optimUrl, publicId:data.public_id, uploadedAt:Date.now(), expireAt};
      } else {
        if(retry < 2) return await uploadOne(file, retry+1);
        showToast(`업로드 오류: ${data.error?.message||'알 수 없는 오류'}`);
        return null;
      }
    }catch(e){
      clearTimeout(timeout);
      if(retry < 2) return await uploadOne(file, retry+1);
      showToast(e.name==='AbortError'?'업로드 시간 초과':`업로드 실패: ${e.message}`);
      return null;
    }
  };
  const results = await Promise.all(files.map(f=>uploadOne(f)));
  uploaded.push(...results.filter(Boolean));

  if(uploaded.length === 0){ showToast('업로드 실패'); return; }

  // Firebase에 저장
  const existing = await dbGet(`votes/${vid}/images/${myKey}`) || [];
  const merged = [...existing, ...uploaded];
  await dbSet(`votes/${vid}/images/${myKey}`, merged);

  // 출석 자동 기록 (완료 처리)
  const v = await dbGet(`votes/${vid}`);
  if(v && v.group && v.date){
    const attDate = getTitleDate(v); // 제목 날짜 기준
    const mondayStr = getWeekKey(attDate);
    const isStartV = (v.title||'').includes('시작');
    if(isStartV){
      await dbSet(`attendance/${v.group}/${mondayStr}/${myKey}/${attDate}`, '완료');
    } else {
      // 완료 투표 사진 → 시작 투표 선택지 결과로 확정
      const allVotes = await dbGet('votes');
      if(allVotes){
        // 완료 투표 date 기준 전날
        const prevDate = new Date(v.date+'T00:00:00');
        prevDate.setDate(prevDate.getDate()-1);
        const prevDateStr = prevDate.toISOString().slice(0,10);
        const startVote = Object.values(allVotes).find(sv=>{
          if(sv.deleted||sv.group!==v.group) return false;
          if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('참여')) return false;
          const t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
          const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
          if(t1&&t2) return t1[1]===t2[1]&&t1[2]===t2[2];
          return sv.responses?.[myKey]!==undefined;
        });
        if(startVote){
          const optText = (startVote.options||[])[startVote.responses[myKey]]||'';
          const result = mapVoteResult(optText);
          await dbSet(`attendance/${v.group}/${mondayStr}/${myKey}/${attDate}`, result);
        } else {
          await dbSet(`attendance/${v.group}/${mondayStr}/${myKey}/${attDate}`, '완료');
        }
      }
    }
  }

  showToast(`✅ ${uploaded.length}장 업로드 완료!`);
  input.value = '';

  // 화면 새로고침
  if(_currentTab==='home') loadHome();
  else if(_currentTab==='dept') loadDeptPage(_currentDept);
}

async function castVote(vid,optIdx){
  const myKey=CU?.name||CU?.key||'admin';
  const v=await dbGet(`votes/${vid}`);
  if(!v){showToast('투표를 찾을 수없습니다');return;}
  if(v.closed){showToast('마감된 투표입니다');return;}

  // 선택지 체크 - 연차/투피드 없으면 막기
  const newOptText = (v.options?.[optIdx]||'').toLowerCase();
  const isLeaveOpt = newOptText.includes('프패')||newOptText.includes('연차')||newOptText.includes('프리패스');
  const isTupideOpt = newOptText.includes('투피드')||newOptText.includes('두배');

  if(isLeaveOpt){
    const gameMembers = await gameGet('members');
    if(gameMembers){
      const gName = groups[v.group]?.name||'';
      const gameEntry = Object.entries(gameMembers).find(([k,m])=>{
        const clean=(m.name||'').replace(/^\*/,'');
        return clean===(gName+myKey)||clean===myKey;
      });
      if(gameEntry){
        const cur = await gameGet(`memberLeave/${gameEntry[0]}`) || 0;
        if(cur <= 0){showToast('⚠️ 보유 연차가 없어요. 다른 선택지를 골라주세요!');return;}
      }
    }
  }

  if(isTupideOpt){
    const gameMembers = await gameGet('members');
    if(gameMembers){
      const gName = groups[v.group]?.name||'';
      const gameEntry = Object.entries(gameMembers).find(([k,m])=>{
        const clean=(m.name||'').replace(/^\*/,'');
        return clean===(gName+myKey)||clean===myKey;
      });
      if(gameEntry){
        const prizesRaw = await gameGet(`memberPrizes/${gameEntry[0]}`);
        const prizes = prizesRaw ? (Array.isArray(prizesRaw)?prizesRaw:Object.values(prizesRaw)) : [];
        const hasTupide = prizes.some(p=>p&&!p.deducted&&(p.name||'').includes('투피드'));
        if(!hasTupide){showToast('⚠️ 보유 투피드 경품이 없어요. 다른 선택지를 골라주세요!');return;}
      }
    }
  }

  // 이전 선택지 확인 - 연차/투피드였으면 복구
  const prevOptIdx = v.responses?.[myKey];
  if(prevOptIdx !== undefined && prevOptIdx !== optIdx){
    const prevOptText = (v.options?.[prevOptIdx]||'').toLowerCase();
    const newOptText = (v.options?.[optIdx]||'').toLowerCase();
    const wasLeave = prevOptText.includes('프패')||prevOptText.includes('연차')||prevOptText.includes('프리패스');
    const wasTupide = prevOptText.includes('투피드')||prevOptText.includes('두배');
    const isLeave = newOptText.includes('프패')||newOptText.includes('연차')||newOptText.includes('프리패스');
    const isTupide = newOptText.includes('투피드')||newOptText.includes('두배');

    // 연차 복구 (프패 → 다른거로 바꿀 때)
    if(wasLeave && !isLeave){
      try{
        const gameMembers = await gameGet('members');
        if(gameMembers){
          const gName = groups[v.group]?.name||'';
          const gameEntry = Object.entries(gameMembers).find(([k,m])=>{
            const clean=(m.name||'').replace(/^\*/,'');
            return clean===(gName+myKey)||clean===myKey;
          });
          if(gameEntry){
            const [gmKey] = gameEntry;
            const cur = await gameGet(`memberLeave/${gmKey}`) || 0;
            await gameSet(`memberLeave/${gmKey}`, cur+1);
            showToast('↩️ 연차 복구됨');
          }
        }
      }catch(e){showToast('⚠️ 연차 복구 실패');}
    }
    // 투피드 → 다른 선택지: 링크 삭제
    if(wasTupide && !isTupide){
      const key=CU?.key||'admin';
      await dbDelete(`votes/${vid}/links/${key}_1`);
      await dbDelete(`votes/${vid}/links/${key}_2`);
      await dbDelete(`votes/${vid}/links/${key}`);
    }
    // 투피드 경품 복구
    if(wasTupide && !isTupide){
      try{
        const gameMembers = await gameGet('members');
        if(gameMembers){
          const gName = groups[v.group]?.name||'';
          const entry = Object.entries(gameMembers).find(([k,m])=>{
            const n=m.name||'';
            return n===myKey||n===(gName+myKey)||n.endsWith(myKey);
          });
          if(entry){
            const [gmKey] = entry;
            const prizesRaw = await gameGet(`memberPrizes/${gmKey}`);
            if(prizesRaw){
              if(Array.isArray(prizesRaw)){
                const idx = prizesRaw.findIndex(p=>p&&p.deducted&&(p.name||'').includes('투피드'));
                if(idx>=0){
                  prizesRaw[idx]={...prizesRaw[idx],deducted:false,usedDate:null};
                  await gameSet(`memberPrizes/${gmKey}`,prizesRaw);
                  showToast('↩️ 투피드 경품 복구됨');
                }
              } else {
                const entries = Object.entries(prizesRaw);
                const found = entries.find(([k,p])=>p&&p.deducted&&(p.name||'').includes('투피드'));
                if(found){
                  await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,false);
                  await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,null);
                  showToast('↩️ 투피드 경품 복구됨');
                }
              }
            }
          }
        }
      }catch(e){showToast('⚠️ 투피드 복구 실패');}
    }
  }

  await dbSet(`votes/${vid}/responses/${myKey}`,optIdx);
  showToast('✅ 투표 완료!');
  await recordAttendance(vid, optIdx);

  // 연차 선택 시 → 같은 날짜 완료 투표에도 자동 기록
  if(isLeaveOpt){
    try{
      const curV = await dbGet(`votes/${vid}`);
      const titleDate = getTitleDate(curV||{});
      const allVotes3 = await dbGet('votes');
      if(allVotes3 && curV){
        const endVote = Object.values(allVotes3).find(sv=>
          !sv.deleted && sv.group===curV.group &&
          (sv.title||'').includes('완료') &&
          getTitleDate(sv)===titleDate
        );
        if(endVote){
          const endVid = Object.keys(allVotes3).find(k=>allVotes3[k]===endVote);
          const mondayStr = getWeekKey(titleDate);
          await dbSet(`attendance/${curV.group}/${mondayStr}/${myKey}/${titleDate}`,'프패');
          // 사진 업로드 방식 완료 투표 - images에 연차 마커 추가
          if(endVote.imageUpload && endVid){
            await dbSet(`votes/${endVid}/images/${myKey}`, [{url:'연차',uploadedAt:Date.now()}]);
          } else if(endVid){
            // 선택지 방식 완료 투표
            const prIdx = (endVote.options||[]).findIndex(o=>(o||'').toLowerCase().includes('프패')||(o||'').includes('연차'));
            if(prIdx>=0) await dbSet(`votes/${endVid}/responses/${myKey}`, prIdx);
          }
        }
      }
    }catch(e){}
  }

  if(_currentTab==='home')loadHome();
  else if(_currentTab==='dept')loadDeptPage(_currentDept);
}

      _editOptList=['출근','재택','휴가'];
    }
  }
  // 이미지 업로드 체크박스 초기화
  const imgCb = document.getElementById('voteImageUpload');
  if(imgCb){
    const editVoteData = vid ? await dbGet(`votes/${vid}`) : null;
    imgCb.checked = editVoteData?.imageUpload||false;
    const wrap = document.getElementById('optListWrap');
    if(wrap) wrap.style.display = imgCb.checked ? 'none' : '';
    imgCb.onchange = ()=>{ if(wrap) wrap.style.display = imgCb.checked ? 'none' : ''; };
  }
  renderOptList();
  document.getElementById('voteModal').classList.add('active');
}

      <input class="fi" value="${escH(o)}" oninput="_editOptList[${i}]=this.value" style="flex:1;padding:8px 12px">

async function saveVote(){
  const title=document.getElementById('voteTitle').value.trim();
  const date=document.getElementById('voteDate').value;
  const time=document.getElementById('voteTime').value;
  const group=document.getElementById('voteGroup').value;
  const vid=document.getElementById('editVoteId').value;
  const isImageUpload=document.getElementById('voteImageUpload')?.checked||false;
  if(!title){showToast('제목을 입력하세요');return;}
  const options=_editOptList.filter(o=>o.trim());
  if(!isImageUpload && options.length<2){showToast('선택지를 2개 이상 입력하세요');return;}
  const tplMembersRaw = document.getElementById('voteTplMembers')?.value.trim();
  const tplMembers = tplMembersRaw ? tplMembersRaw.split(',').map(m=>m.trim()).filter(Boolean) : [];
  const data={title,date,time,group,options,createdAt:Date.now(),createdBy:CU.name};
  if(tplMembers.length>0) data.tplMembers = tplMembers;
  if(isImageUpload) data.imageUpload=true;
  if(vid){
    const existing=await dbGet(`votes/${vid}`);
    await dbSet(`votes/${vid}`,{...existing,...data});
    showToast('✅ 수정됨');
  }else{
    await dbPush('votes',data);
    showToast('✅ 등록됨');
    const gName=group==='all'?'전체':(groups[group]?.name||group);
    sendFCMNotification({
      title:`📋 새 투표: ${title}`,
      body:`[${gName}] ${date?date+' '+time+' 마감':'기한 없음'}`,
      data:{tab:'home'}
    });
  }
  closeVoteModal();
  if(_currentTab==='home')loadHome();else loadDeptPage(_currentDept);
}

function closeVoteModal(){

const VOTE_RESULT_MAP = {
  '완료': '완료', '퇴근': '완료', '출근': '완료',
  '공게': '공게', '2인': '공게', '공개': '공게',
  '프패': '프패', '연차': '프패', '프리패스': '프패',
  '봉사': '봉사', '열정페이': '봉사',
  '노피드': '노피드', '재능기부': '노피드',
  '투피드': '투피드', '두배': '투피드',
  '확인증': '확인증',
  '누락': '누락'
};

function mapVoteResult(optionText) {
  if(!optionText) return '';
  const t = optionText.toLowerCase();
  for(const [key, val] of Object.entries(VOTE_RESULT_MAP)) {
    if(t.includes(key.toLowerCase())) return val;
  }
  return '완료'; // 기본값
}

// 날짜 → 엑셀 시리얼 번호 변환
function dateToExcelSerial(dateStr) {
  const d = new Date(dateStr);
  const start = new Date(1899, 11, 30);
  return Math.round((d - start) / 86400000);
}

// 엑셀 시리얼 → 날짜 문자열
function excelSerialToDate(serial) {
  const d = new Date(1899, 11, 30);
  d.setDate(d.getDate() + serial);
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

// 주차 계산 (월요일 기준)
function getTitleDate(v){
  const m=(v.title||'').match(/(\d+)월\s*(\d+)일/);
  if(m){const yr=new Date().getFullYear();return `${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
  return v.date||'';
}

function getWeekKey(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().slice(0, 10); // 월요일 날짜
}

function getWeekLabel(mondayStr) {
  const d = new Date(mondayStr);
  const m = d.getMonth() + 1;
  // 해당 달의 몇째 주인지
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
  const weekNum = Math.ceil((d.getDate() + firstDay.getDay() - 1) / 7);
  return `${m}월 ${weekNum}주`;
}

async function loadStatusGroup(gid) {
  Object.keys(groups).forEach(id => {
    const btn = document.getElementById(`statusTab_${id}`);
    if(btn) { btn.style.background = id===gid?'var(--accent)':'var(--surface2)'; btn.style.color = id===gid?'white':'var(--text2)'; }
  });

  const el = document.getElementById('statusContent');
  if(!el) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  const [votes, attendance, crewMembers] = await Promise.all([
    dbGet('votes'),
    dbGet(`attendance/${gid}`),
    dbGet('members')
  ]);

  const gName = groups[gid]?.name || gid;
  const keyToName = {};
  if(crewMembers) Object.entries(crewMembers).forEach(([k,m]) => { if(m.name) keyToName[k] = m.name; });

  const att = attendance || {};

  // 주차 목록: attendance 데이터 + 투표 날짜 합쳐서
  const weeks = {}; // mondayStr → {dates: Set, members: {}}

  // 1. attendance 데이터에서 주차 추출
  Object.entries(att).forEach(([mondayStr, members]) => {
    if(!weeks[mondayStr]) weeks[mondayStr] = {dates: new Set(), members: {}};
    Object.entries(members).forEach(([mname, dates]) => {
      Object.entries(dates).forEach(([date, result]) => {
        weeks[mondayStr].dates.add(date);
        if(!weeks[mondayStr].members[mname]) weeks[mondayStr].members[mname] = {};
        weeks[mondayStr].members[mname][date] = result;
      });
    });
  });

  // 2. 투표 데이터에서 추가 (그룹 전용 투표)
  if(votes) {
    Object.entries(votes)
      .filter(([,v]) => !v.deleted && v.group === gid && v.date)
      .forEach(([vid, v]) => {
        const mondayStr = getWeekKey(v.date);
        if(!weeks[mondayStr]) weeks[mondayStr] = {dates: new Set(), members: {}};
        weeks[mondayStr].dates.add(v.date);
        const opts = v.options || [];
        Object.entries(v.responses || {}).forEach(([mkey, optIdx]) => {
          const mname = keyToName[mkey] || mkey;
          if(!weeks[mondayStr].members[mname]) weeks[mondayStr].members[mname] = {};
          const result = mapVoteResult(opts[optIdx] || '');
          if(!weeks[mondayStr].members[mname][v.date] || result === '완료') {
            weeks[mondayStr].members[mname][v.date] = result;
          }
        });
      });
  }

  if(Object.keys(weeks).length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>${gName} 데이터 없음</div>`;
    return;
  }

  const resultColor = {'완료':'#5DB88A','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b','확인증':'#FF85C1'};
  const ADMIN_NAMES = ['고인물','에이스','경력직','불주먹','김월루','퇴사각'];
  let html = '';

  for(const [mondayStr, wdata] of Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0]))) {
    const wLabel = getWeekLabel(mondayStr);
    const dates = [...wdata.dates].sort();
    const memberResults = wdata.members;

    html += `<div style="background:white;border-radius:16px;margin:8px 14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.06)">`;
    html += `<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">`;
    html += `<div style="font-size:14px;font-weight:800">${wLabel}</div>`;
    html += `<div style="display:flex;gap:6px">`;
    html += `<button onclick="downloadWeekExcel('${gid}','${mondayStr}')" style="font-size:11px;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;background:var(--green);color:white;font-weight:700">⬇️ 엑셀</button>`;
    if(CU?.role==='admin') html += `<button onclick="openAttendanceEdit('${gid}','${mondayStr}')" style="font-size:11px;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;background:var(--surface2);color:var(--text2);font-weight:700">✏️ 수정</button>`;
    html += `</div></div>`;

    html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">`;
    html += `<tr style="background:var(--surface2)"><th style="padding:6px 8px;text-align:left;font-weight:700;white-space:nowrap">멤버</th>`;
    dates.forEach(d => {
      const dd = new Date(d);
      const days = ['일','월','화','수','목','금','토'];
      html += `<th style="padding:6px 8px;text-align:center;font-weight:700;white-space:nowrap">${dd.getMonth()+1}/${dd.getDate()}<br><span style="font-weight:400;color:var(--text3)">${days[dd.getDay()]}</span></th>`;
    });
    html += `<th style="padding:6px 8px;text-align:center;font-weight:700">풀참</th></tr>`;

    // 정렬: 인사팀 먼저, 그다음 가나다
    const sortedMembers = Object.entries(memberResults).sort(([a],[b]) => {
      const aA = ADMIN_NAMES.includes(a), bA = ADMIN_NAMES.includes(b);
      if(aA && !bA) return -1; if(!aA && bA) return 1;
      if(aA && bA) return ADMIN_NAMES.indexOf(a) - ADMIN_NAMES.indexOf(b);
      return a.localeCompare(b, 'ko');
    });

    sortedMembers.forEach(([mname, mdates]) => {
      const fullCount = dates.filter(d => {
        const r = mdates[d];
        return ['완료','공게','봉사','투피드','노피드','프패'].includes(r);
      }).length;
      const isFull = fullCount >= 7;
      const isAdminM = ADMIN_NAMES.includes(mname);
      html += `<tr style="border-top:1px solid var(--border);${isAdminM?'background:#fff8f5':''}">`;
      html += `<td style="padding:6px 8px;font-weight:${isAdminM?'800':'600'};white-space:nowrap;color:${isAdminM?'var(--accent)':'inherit'}">${escH(mname)}</td>`;
      dates.forEach(d => {
        const r = mdates[d] || '';
        const bg = resultColor[r] || '#f1f5f9';
        html += `<td style="padding:4px;text-align:center"><span style="display:inline-block;padding:3px 6px;border-radius:6px;background:${r?bg+'22':'#f1f5f9'};color:${r?bg:'#ccc'};font-weight:700;font-size:10px;white-space:nowrap">${r||'-'}</span></td>`;
      });
      html += `<td style="padding:6px 8px;text-align:center;font-weight:800;color:${isFull?'var(--green)':'var(--text3)'}">${isFull?'✅':(fullCount+'/7')}</td>`;
      html += `</tr>`;
    });
    html += `</table></div></div>`;
  }

  el.innerHTML = html || '<div class="empty">데이터 없음</div>';
}

// ── 출석 자동 기록 (castVote 후 호출) ──
async function recordAttendance(vid, optIdx) {
  try {
    const v = await dbGet(`votes/${vid}`);
    if(!v || !v.date || !v.group || v.group === 'all') return;

    const gid = v.group;
    const gName = groups[gid]?.name || '';

    // 시작 투표 → 선택지 기준, 완료 투표 선택지 → 결과 업데이트
    const isStartVote = (v.title||'').includes('시작');
    const isEndVote2 = (v.title||'').includes('완료') || v.imageUpload;
    if(!isStartVote && !isEndVote2) return;

    // 제목에서 날짜 추출 (예: 5월 27일 → 해당년도 기준)
    const titleMatch = (v.title||'').match(/(\d+)월\s*(\d+)일/);
    let date = v.date;
    if(titleMatch){
      const now = new Date();
      const mon = titleMatch[1].padStart(2,'0');
      const day = titleMatch[2].padStart(2,'0');
      date = `${now.getFullYear()}-${mon}-${day}`;
    }
    const mondayStr = getWeekKey(date);
    const myKey = CU?.name || CU?.key || 'guest';
    const optText = (v.options || [])[optIdx] || '';
    const result = mapVoteResult(optText);

    // 사진 올렸으면 완료, 없으면 선택지 기준
    const myImages = v.images?.[myKey] || [];
    const finalResult = myImages.length > 0 ? '완료' : result;

    await dbSet(`attendance/${gid}/${mondayStr}/${myKey}/${date}`, finalResult);

    // 투피드 선택 시 → 보유 경품 중 투피드 1개 차감
    // 프패 선택 시 → 보유 연차 1일 차감
    const crewMembers = await dbGet('members');
    if(crewMembers){
      const crewEntry = Object.entries(crewMembers).find(([k,m])=>
        m.name===myKey || (m.name||'').endsWith(myKey)
      );
      if(crewEntry){
        const [ck] = crewEntry;
        if(result === '투피드'){
          const gameMembers = await gameGet('members');
          if(gameMembers){
            const gName = groups[gid]?.name || '';
            const fullName = gName + myKey;
            const gameEntry = Object.entries(gameMembers).find(([k,m])=>{
              const clean = (m.name||'').replace(/^\*/,'');
              return clean === fullName;
            });
            if(gameEntry){
              const [gmKey] = gameEntry;
              const prizesRaw = await gameGet(`memberPrizes/${gmKey}`);
              if(prizesRaw){
                // 배열이든 객체든 처리
                const prizeArr = Array.isArray(prizesRaw) ? [...prizesRaw] : Object.values(prizesRaw);
                const tupiIdx = prizeArr.findIndex(p=>p && !p.deducted && (p.name||'').includes('투피드'));
                if(tupiIdx >= 0){
                  prizeArr[tupiIdx] = {...prizeArr[tupiIdx], deducted: true, usedDate: date};
                  await gameSet(`memberPrizes/${gmKey}`, prizeArr);
                  showToast(`🎁 ${gName}${myKey} 투피드 경품 사용됨 (${date})`);
                } else {
                  showToast(`⚠️ ${gName}${myKey} 투피드 경품 없음`);
                }
              } else {
                showToast(`⚠️ ${gName}${myKey} 보유 경품 없음`);
              }
            } else {
              showToast(`⚠️ 오락실에서 ${gName}${myKey} 를 찾을 수 없음`);
            }
          }
        } else if(result === '프패'){
          // 오락실 연차 1일 차감
          const gameMembers = await gameGet('members');
          if(gameMembers){
            const gName = groups[gid]?.name||'';
            const gameEntry = Object.entries(gameMembers).find(([k,m])=>{
              const clean=(m.name||'').replace(/^\*/,'');
              return clean===(gName+myKey)||clean===myKey;
            });
            if(gameEntry){
              const [gmKey] = gameEntry;
              const cur = await gameGet(`memberLeave/${gmKey}`) || 0;
              if(cur > 0){
                await gameSet(`memberLeave/${gmKey}`, cur-1);
                await dbPush(`leaveLog/${ck}`, {type:'deduct',amount:1,date,time:Date.now(),memo:`연차 사용 ${date}`});
                showToast(`🏖️ 연차 1일 차감 · ${date} (잔여 ${cur-1}일)`);
              } else {
                showToast(`⚠️ 잔여 연차 없음`);
              }
            } else {
              showToast(`⚠️ 오락실에서 멤버를 찾을 수 없음`);
            }
          }
        }
      }
    }

    checkFullAttendance(gid, mondayStr, myKey);
  } catch(e) { console.warn('recordAttendance error', e); }
}

async function checkFullAttendance(gid, mondayStr, memberKey) {
  try {
    const att = await dbGet(`attendance/${gid}/${mondayStr}/${memberKey}`);
    if(!att) return;
    const results = Object.values(att);
    const validCount = results.filter(r => ['완료','공게','봉사','투피드','노피드','프패','확인증'].includes(r)).length;
    if(validCount >= 7) {
      // 연차 지급 (오락실 Firebase)
      const gameMembers = await gameGet('members');
      if(!gameMembers) return;
      // 이름으로 매칭
      const myName = CU?.name || '';
      const match = Object.entries(gameMembers).find(([k,m]) => {
        const clean = (m.name||'').replace(/^\*/,'');
        const realName = clean.replace(/^(좋아요|댓글|시크릿)/,'');
        return realName === myName;
      });
      if(!match) return;
      const [gameKey] = match;
      // 이미 지급됐는지 확인
      const alreadyKey = `fullAttendance/${gid}/${mondayStr}/${memberKey}`;
      const already = await dbGet(alreadyKey);
      if(already) return;
      // 연차 지급
      const cur = await gameGet(`memberLeave/${gameKey}`) || 0;
      await gameSet(`memberLeave/${gameKey}`, cur + 1);
      await dbSet(alreadyKey, true);
      showToast('🎉 풀참 연차 1일이 지급됐습니다!');
    }
  } catch(e) { console.warn('checkFullAttendance error', e); }
}

async function renderAttEditList(gid, mondayStr, dates, filter){
  const listEl = document.getElementById('attEditList');
  if(!listEl) return;
  const crewMembers = await dbGet('members');
  const attData = await dbGet(`attendance/${gid}/${mondayStr}`) || {};
  let members = crewMembers ? Object.values(crewMembers).filter(m=>m.name) : [];
  if(filter) members = members.filter(m=>m.name.includes(filter));
  // ㄱㄴㄷ 정렬
  members.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const opts = ['','완료','프패','공게','봉사','노피드','투피드','확인증'];
  const searchInput = document.querySelector('#attEditModal input');

  listEl.innerHTML = members.map(m=>{

    return `<div style="margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">${escH(m.name)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${dates.map(d=>{
          const cur = mData[d]||'';
          const dayLabel=['월','화','수','목','금','토','일'][new Date(d).getDay()===0?6:new Date(d).getDay()-1];

async function selectAttResult(gid, mondayStr, memberName, date, sel){
  const val = sel.value;
  if(val){ await dbSet(`attendance/${gid}/${mondayStr}/${memberName}/${date}`, val); }
  else { await dbDelete(`attendance/${gid}/${mondayStr}/${memberName}/${date}`); }
  // 색상 업데이트
  const col = _attResultColor[val]||'#ddd';
  sel.style.borderColor = col;
  sel.style.background = col;
  sel.style.color = val?'white':'#888';
  showToast(`${memberName} ${date.slice(5)} → ${val||'삭제'}`);
}

async function cycleAttResult(gid, mondayStr, memberName, date, el){
  // 하위호환 유지
  const curEl = el.querySelector('div:last-child');
  const cur = curEl.textContent.trim()==='-' ? '' : curEl.textContent.trim();
  const idx = _attResultCycle.indexOf(cur);
  const next = _attResultCycle[(idx+1) % _attResultCycle.length];
  if(next){ await dbSet(`attendance/${gid}/${mondayStr}/${memberName}/${date}`, next); }
  else { await dbDelete(`attendance/${gid}/${mondayStr}/${memberName}/${date}`); }
  curEl.style.background = _attResultColor[next]||'#ddd';
  curEl.style.color = next?'white':'#bbb';
  curEl.textContent = next||'-';
  showToast(`${memberName} ${date.slice(5)} → ${next||'삭제'}`);
}

function filterAttEdit(val, gid, mondayStr){
  const monday = new Date(mondayStr);
  const dates = [];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(d.getDate()+i);dates.push(d.toISOString().slice(0,10));}
  renderAttEditList(gid, mondayStr, dates, val);
}

// ── 엑셀 다운로드 ──
async function downloadWeekExcel(gid, mondayStr) {
  showToast('⏳ 엑셀 생성 중...');
  try {
    const [votes, attendance, gameMembers, memberLeave] = await Promise.all([
      dbGet('votes'),
      dbGet(`attendance/${gid}`),
      gameGet('members'),
      gameGet('memberLeave')
    ]);

    const gName = groups[gid]?.name || gid;
    const wLabel = getWeekLabel(mondayStr);
    const att = attendance?.[mondayStr] || {};

    // 해당 주 날짜 목록 (월~일)
    const monday = new Date(mondayStr);
    const dates = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(monday.getDate()+i);
      dates.push(d.toISOString().slice(0,10));
    }

    // 오락실 멤버 목록 (해당 그룹만)
    const ADMIN_NAMES = ['고인물','에이스','경력직','불주먹','김월루','퇴사각'];
    const allMembers = [];
    if(gameMembers) {
      Object.entries(gameMembers).forEach(([k,m]) => {
        if(!m.name) return;
        const clean = m.name.replace(/^\*/,'');
        const group = ['좋아요','댓글','시크릿'].find(g=>clean.startsWith(g));
        if(groups[gid]?.name !== group) return;
        const realName = group ? clean.replace(group,'') : clean;
        allMembers.push({key:k, name:realName, leave:memberLeave?.[k]||0});
      });
    }
    // 인사팀 먼저, 나머지 가나다
    allMembers.sort((a,b)=>{
      const aA=ADMIN_NAMES.includes(a.name), bA=ADMIN_NAMES.includes(b.name);
      if(aA&&!bA)return -1; if(!aA&&bA)return 1;
      if(aA&&bA)return ADMIN_NAMES.indexOf(a.name)-ADMIN_NAMES.indexOf(b.name);
      return a.name.localeCompare(b.name,'ko');
    });

    // 멤버별 결과 (투표 + attendance 이전 데이터)
    const memberResults = {};
    // crew31 members key → name 매핑
    const crewMembers = await dbGet('members')||{};
    const keyToName = {};
    Object.entries(crewMembers).forEach(([k,m])=>{ if(m.name) keyToName[k]=m.name; });

    if(votes) {
      Object.entries(votes).filter(([,v])=>!v.deleted&&v.group===gid&&v.date&&getWeekKey(v.date)===mondayStr)
        .forEach(([,v])=>{
          const opts=v.options||[];
          Object.entries(v.responses||{}).forEach(([mkey,optIdx])=>{
            const mname=keyToName[mkey]||mkey;
            if(!memberResults[mname])memberResults[mname]={};
            const r=mapVoteResult(opts[optIdx]||'');
            if(!memberResults[mname][v.date]||r==='완료') memberResults[mname][v.date]=r;
          });
        });
    }
    Object.entries(att).forEach(([mname,dateMap])=>{
      if(!memberResults[mname])memberResults[mname]={};
      Object.assign(memberResults[mname], dateMap);
    });

    // SheetJS로 xlsx 생성
    const XLSX = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');

    const RESULT_COLORS = {
      '완료': {bg:'C6EFCE', fg:'006100'},
      '프패': {bg:'FFEB9C', fg:'9C6500'},
      '공게': {bg:'BDD7EE', fg:'1F4E79'},
      '봉사': {bg:'E2EFDA', fg:'375623'},
      '노피드': {bg:'D9D9D9', fg:'595959'},
      '투피드': {bg:'FCE4D6', fg:'C55A11'},
      '누락': {bg:'FF0000', fg:'FFFFFF'},
    };
    const HEADER_COLOR = '1F4E46';

    const wb2 = XLSX.utils.book_new();
    const aoa = []; // array of arrays

    // 행1: 시작일
    aoa.push([null, '시작일']);
    // 행2: 날짜 + 참여수
    const row2 = [null, monday];
    dates.forEach(d => {
      const cnt = allMembers.filter(m => memberResults[m.name]?.[d]).length;
      row2.push(null, cnt); // 빈칸 + 참여수 (구조상 col D부터)
    });
    // 실제로는 col E~K에 참여수
    const row2b = [null, monday, null, null];
    dates.forEach(d => row2b.push(allMembers.filter(m=>memberResults[m.name]?.[d]).length));
    aoa.push(row2b);

    // 행3: 주차
    aoa.push([null, `${wLabel}차`]);
    // 행4: 현황 제목
    aoa.push([null, `${wLabel}차 현황`]);
    // 행5: 헤더
    const h5 = [null, 'NO', 'ID', 'INS ID'];
    dates.forEach(d => { const dd=new Date(d); h5.push(`${dd.getMonth()+1}/${dd.getDate()}`); });
    h5.push('프리패스');
    aoa.push(h5);
    // 행6: 열번호
    const h6 = [null, '1열', '2열', '3열'];
    for(let i=0;i<dates.length;i++) h6.push(`${i+4}열`);
    h6.push(`${dates.length+4}열`);
    aoa.push(h6);

    // 멤버 행
    allMembers.forEach((m, idx) => {
      const row = [null, idx+1, m.name, ''];
      const valid = ['완료','공게','투피드','노피드','봉사','프패'];
      let ppCount = 0;
      dates.forEach(d => {
        const r = memberResults[m.name]?.[d] || '';
        row.push(r);
        if(valid.includes(r)) ppCount++;
      });
      row.push(ppCount >= 7 ? 'O' : '');
      aoa.push(row);
    });

    const ws2 = XLSX.utils.aoa_to_sheet(aoa, {dateNF:'YYYY-MM-DD'});

    // 열 너비
    ws2['!cols'] = [
      {wch:2},{wch:5},{wch:14},{wch:16},
      ...dates.map(()=>({wch:8})),
      {wch:8}
    ];

    XLSX.utils.book_append_sheet(wb2, ws2, wLabel);
    XLSX.writeFile(wb2, `${gName}_${wLabel}_현황.xlsx`);
    showToast('✅ 엑셀 다운로드 완료!');
  } catch(e) {
    console.error(e);
    showToast('다운로드 실패: '+e.message);
  }
}

async function syncGameMembers(){
  const resultEl=document.getElementById('syncResult');
  if(resultEl) resultEl.textContent='동기화 중...';
  try{
    const [gameMembers, crewMembers] = await Promise.all([
      gameGet('members'),
      dbGet('members')
    ]);
    if(!gameMembers){showToast('오락실 연결 실패');return;}

    const GROUPS=['좋아요','댓글','시크릿'];
    const existing=crewMembers||{};

    // 기존 사무실 멤버 닉네임 목록
    const existingNames=new Set(Object.values(existing).map(m=>m.name||''));

    let added=0, skipped=0;
    const toAdd=[];

    Object.values(gameMembers).forEach(m=>{
      if(!m.name)return;
      const clean=m.name.replace(/^\*/,'');
      const group=GROUPS.find(g=>clean.startsWith(g));
      const nick=group?clean.slice(group.length):clean;
      if(!nick)return;
      if(existingNames.has(nick)){skipped++;return;}
      // 중복 체크 (toAdd 안에도)
      if(toAdd.includes(nick)){skipped++;return;}
      toAdd.push(nick);
    });

    // 일괄 추가
    for(const nick of toAdd){
      await dbPush('members',{name:nick,role:'member'});
      added++;
    }

    const msg=`✅ ${added}명 추가됨, ${skipped}명 중복 스킵`;
    showToast(msg);
    if(resultEl) resultEl.textContent=msg;
    if(added>0) loadSettings();
  }catch(e){
    showToast('오류: '+e.message);
    if(resultEl) resultEl.textContent='오류: '+e.message;
  }
}

// 알림 저장 키 (localStorage)
const NOTI_KEY='crew31Noti';

// 알림 읽기/쓰기
function getNotiList(){try{return JSON.parse(localStorage.getItem(NOTI_KEY)||'[]');}catch{return [];}}
function saveNotiList(list){localStorage.setItem(NOTI_KEY,JSON.stringify(list.slice(-100)));} // 최근 100개
function getSeenTs(key){try{return JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}')[key]||0;}catch{return 0;}}
function setSeenTs(key,ts){try{const o=JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}');o[key]=ts;localStorage.setItem(NOTI_SEEN_KEY,JSON.stringify(o));}catch{}}
function getLastRead(){return parseInt(localStorage.getItem(NOTI_READ_KEY)||'0');}
function markAllRead(){localStorage.setItem(NOTI_READ_KEY,Date.now().toString());updateNotiBadge();}

// 배지 갱신
function updateNotiBadge(){
  const badge=document.getElementById('notiBadge');if(!badge)return;
  const lastRead=getLastRead();
  const unread=getNotiList().filter(n=>n.ts>lastRead).length;
  if(unread>0){badge.textContent=unread>9?'9+':unread;badge.style.display='inline-flex';}
  else{badge.style.display='none';}
}

// 알림 추가 (내부 함수)
function pushNoti({icon,title,body,tab,ts}){
  const list=getNotiList();
  const id=`${ts}_${Math.random().toString(36).slice(2,6)}`;
  list.unshift({id,icon,title,body,tab,ts:ts||Date.now()});
  saveNotiList(list);
  updateNotiBadge();
  if(document.hidden&&Notification.permission==='granted'){
    try{new Notification(title,{body,icon:'/favicon.ico',tag:id,silent:false});}catch{}
  }
  if(_currentTab!==tab){
    showBannerNoti(icon,title,body,tab);
  }
}

function showBannerNoti(icon,title,body,tab){
  const existing=document.getElementById('notiBanner');
  if(existing)existing.remove();
  const banner=document.createElement('div');
  banner.id='notiBanner';
  banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#FF85C1;color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(255,133,193,0.4);cursor:pointer;transform:translateY(-100%);transition:transform 0.3s ease;';

async function pollNotices(){
  if(!CU)return;
  const seenTs=getSeenTs('notice');
  const notices=await dbGet('notices');
  if(!notices)return;
  Object.values(notices).forEach(n=>{
    if(!n||!n.createdAt)return;
    if(n.createdAt<=seenTs)return;
    if(n.createdBy===CU.name)return; // 내가 쓴 건 제외
    pushNoti({icon:'📢',title:'새 공지사항',body:n.title||'새 공지가 등록됐습니다',tab:'notice',ts:n.createdAt});
  });
  const maxTs=Math.max(...Object.values(notices).map(n=>n?.createdAt||0));
  if(maxTs>seenTs)setSeenTs('notice',maxTs);
}

  if(!CU)return;
  // 전체 채팅

async function pollChatRoom(roomPath,roomName,tab){
  if(!CU)return;
  const seenTs=getSeenTs(roomPath);
  // 마지막 5개 메시지만 확인
  const msgs=await dbGet(roomPath);
  if(!msgs)return;
  const arr=Object.values(msgs).filter(m=>m&&m.time&&m.time>seenTs&&m.senderName!==CU.name);
  arr.forEach(m=>{
    pushNoti({icon:'💬',title:roomName,body:`${m.senderName}: ${(m.body||'').slice(0,40)}`,tab,ts:m.time});
  });
  const maxTs=Math.max(seenTs,...Object.values(msgs).map(m=>m?.time||0));
  if(maxTs>seenTs)setSeenTs(roomPath,maxTs);
}

async function pollDMs(){
  if(!CU||!CU.key)return;
  // 내 key가 포함된 DM 경로 목록 확인
  const allDMs=await dbGet('chat_dm');
  if(!allDMs)return;
  for(const [roomId,msgs] of Object.entries(allDMs)){
    if(!roomId.includes(CU.key))continue;
    if(!msgs)continue;
    const seenTs=getSeenTs('dm_'+roomId);
    const arr=Object.values(msgs).filter(m=>m&&m.time&&m.time>seenTs&&m.senderName!==CU.name);
    arr.forEach(m=>{
      pushNoti({icon:'💬',title:`DM · ${m.senderName}`,body:(m.body||'').slice(0,40),tab:'chat',ts:m.time});
    });
    const maxTs=Math.max(seenTs,...Object.values(msgs).map(m=>m?.time||0));
    if(maxTs>seenTs)setSeenTs('dm_'+roomId,maxTs);
  }
}

async function pollPrizes(){
  if(!CU||!CU.key)return;
  const seenTs=getSeenTs('prizes_'+CU.key);
  // 오락실 Firebase에서 내 경품 데이터 확인
  try{

    });
    const maxTs=Math.max(seenTs,...arr.map(p=>p?.time||0));
    if(maxTs>seenTs)setSeenTs('prizes_'+CU.key,maxTs);
  }catch{}
}

let _notiPollInterval=null;
function startNotiPolling(){
  if(_notiPollInterval)clearInterval(_notiPollInterval);
  _initSeenIfEmpty();
  const poll=async()=>{
    await Promise.allSettled([
      pollNotices(),pollChats(),pollVotes(),pollCalEvents(),pollPrizes(),
      pollFCMQueue() // FCM 큐 폴링
    ]);
    updateNotiBadge();
  };
  poll();
  _notiPollInterval=setInterval(poll,30000);
}

async function _initSeenIfEmpty(){
  // 한 번도 seen 설정 안 된 경우 현재 시각으로 초기화 (과거 데이터 알림 방지)
  const seen=JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}');
  if(Object.keys(seen).length>0)return;
  const now=Date.now();
  const keys=['notice','votes','calEvents'];
  keys.forEach(k=>seen[k]=now);
  // 채팅 roomPath도 초기화
  seen['chat_all']=now;
  Object.keys(groups).forEach(gid=>seen[`chat_dept_${gid}`]=now);
  localStorage.setItem(NOTI_SEEN_KEY,JSON.stringify(seen));
}

  markAllRead();
  const mb=document.getElementById('mainBody');
  const list=getNotiList();

  let html=`<div style="padding-bottom:60px">`;

  // 알림 설명 + 삭제 버튼
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 2px">`;
  html+=`<div style="font-size:11px;color:var(--text3)">앱 내 알림 · 30초마다 자동 갱신</div>`;
  html+=`<div style="font-size:11px;margin-top:2px;color:${_pushReady?'var(--green)':'var(--text3)'}">`;
  html+=_pushReady?`🔔 백그라운드 푸시 알림 활성화됨`:`📴 백그라운드 푸시 비활성화`;
  html+=`</div>`;
  if(!_pushReady){
    html+=`<button onclick="initWebPush()" style="margin-top:6px;font-size:12px;padding:6px 14px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700">🔔 푸시 알림 허용</button>`;
  }
  html+=`<button onclick="clearNotiList()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px">🗑 전체 삭제</button>`;
  html+=`</div>`;

  if(list.length===0){
    html+=`<div style="text-align:center;padding:48px 20px;color:var(--text3)"><div style="font-size:40px;margin-bottom:12px">🔔</div><div style="font-size:14px">새로운 알림이 없습니다</div></div>`;
  }else{
    // 날짜별 그룹핑
    const groups_={}; // 날짜 -> [알림]
    list.forEach(n=>{
      const d=new Date(n.ts).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      if(!groups_[d])groups_[d]=[];
      groups_[d].push(n);
    });
    Object.entries(groups_).forEach(([date,items])=>{
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);padding:10px 16px 4px">${date}</div>`;
      items.forEach(n=>{
        const timeStr=new Date(n.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
        html+=`<div onclick="goTab('${n.tab}')" style="background:white;border-radius:14px;margin:4px 14px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.05);display:flex;align-items:flex-start;gap:12px;cursor:pointer;active:opacity:0.7">`;
        html+=`<div style="width:38px;height:38px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${n.icon}</div>`;
        html+=`<div style="flex:1;min-width:0">`;
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">`;
        html+=`<div style="font-size:13px;font-weight:800">${escH(n.title)}</div>`;
        html+=`<div style="font-size:10px;color:var(--text3);flex-shrink:0;margin-left:8px">${timeStr}</div>`;
        html+=`</div>`;
        html+=`<div style="font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(n.body)}</div>`;
        html+=`</div></div>`;
      });
    });
  }

  html+=`</div>`;
  mb.innerHTML=html;
}

function clearNotiList(){
  if(!confirm('알림을 모두 삭제하시겠습니까?'))return;
  localStorage.removeItem(NOTI_KEY);
  updateNotiBadge();
  loadNotiPage();
}
</script>
</body>
</html>
