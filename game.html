<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎡 돌림판 뽑기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
–gold: #FFD700;
–gold2: #FFA500;
–dark: #1a0a2e;
–purple: #6C35DE;
–pink: #FF6B9D;
–cyan: #00F5FF;
–card: rgba(255,255,255,0.07);
–border: rgba(255,255,255,0.12);
}

html {
background-color: #1a0a2e;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background-color: #1a0a2e;
background-image:
radial-gradient(ellipse at 20% 20%, rgba(108,53,222,0.5) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(255,107,157,0.4) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0,245,255,0.15) 0%, transparent 70%);
background-attachment: fixed;
color: #fff;
min-height: 100vh;
min-height: -webkit-fill-available;
overflow-x: hidden;
}

/* ===== STARS ===== */
.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: transparent; }
.star {
position: absolute;
border-radius: 50%;
background: white;
animation: twinkle var(–d, 3s) ease-in-out infinite var(–delay, 0s);
}
@keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* ===== LAYOUT ===== */
#app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; }

/* ===== HEADER ===== */
.header {
background: linear-gradient(135deg, rgba(108,53,222,0.9), rgba(255,107,157,0.9));
backdrop-filter: blur(20px);
padding: 16px 20px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
z-index: 100;
}
.header-title { font-family: ‘Jua’, cursive; font-size: 22px; letter-spacing: 1px; }
.header-user { font-size: 12px; opacity: 0.8; text-align: right; }
.header-user strong { color: var(–gold); display: block; font-size: 14px; }
.btn-logout {
background: rgba(255,255,255,0.2);
border: 1px solid rgba(255,255,255,0.3);
color: white;
padding: 5px 12px;
border-radius: 20px;
font-size: 12px;
cursor: pointer;
transition: all 0.2s;
}
.btn-logout:hover { background: rgba(255,255,255,0.3); }

/* ===== NAV ===== */
.nav {
display: flex;
background: rgba(0,0,0,0.4);
border-bottom: 1px solid var(–border);
position: sticky;
top: 65px;
z-index: 99;
overflow-x: auto;
scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
flex: 1;
min-width: 70px;
padding: 10px 8px;
background: none;
border: none;
color: rgba(255,255,255,0.5);
font-size: 11px;
font-family: ‘Noto Sans KR’, sans-serif;
cursor: pointer;
transition: all 0.2s;
border-bottom: 2px solid transparent;
white-space: nowrap;
}
.nav-btn.active {
color: var(–gold);
border-bottom-color: var(–gold);
background: rgba(255,215,0,0.05);
}
.nav-btn span { display: block; font-size: 18px; margin-bottom: 2px; }

/* ===== PAGES ===== */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* ===== LOGIN ===== */
.login-wrap {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
min-height: -webkit-fill-available;
padding: 40px 24px;
position: relative;
z-index: 1;
}
.login-logo { font-family: ‘Jua’, cursive; font-size: 56px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.login-title { font-family: ‘Jua’, cursive; font-size: 28px; margin-bottom: 4px; color: var(–gold); }
.login-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 40px; }
.login-card {
width: 100%;
max-width: 360px;
background: rgba(255,255,255,0.07);
background-color: rgba(30,15,60,0.7);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 24px;
padding: 28px;
-webkit-backdrop-filter: blur(20px);
backdrop-filter: blur(20px);
}
.login-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.login-tab {
flex: 1;
padding: 10px;
border-radius: 12px;
border: 1px solid var(–border);
background: transparent;
color: rgba(255,255,255,0.5);
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 14px;
cursor: pointer;
transition: all 0.2s;
}
.login-tab.active {
background: -webkit-linear-gradient(135deg, #6C35DE, #FF6B9D);
background: linear-gradient(135deg, #6C35DE, #FF6B9D);
color: white;
border-color: transparent;
}
.input-group { margin-bottom: 14px; }
.input-group label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: block; }
.input-group input, .input-group select {
width: 100%;
padding: 12px 16px;
background: rgba(255,255,255,0.08);
border: 1px solid var(–border);
border-radius: 12px;
color: white;
font-size: 15px;
font-family: ‘Noto Sans KR’, sans-serif;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}
.input-group input:focus, .input-group select:focus { border-color: var(–purple); }
.input-group select option { background: #1a0a2e; }
.btn-primary {
width: 100%;
padding: 14px;
background: -webkit-linear-gradient(135deg, #6C35DE, #FF6B9D);
background: linear-gradient(135deg, #6C35DE, #FF6B9D);
border: none;
border-radius: 14px;
color: white;
font-size: 16px;
font-family: ‘Jua’, cursive;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
box-shadow: 0 4px 20px rgba(108,53,222,0.4);
letter-spacing: 1px;
-webkit-appearance: none;
}
.btn-primary:active { transform: scale(0.97); }
.btn-primary:hover { box-shadow: 0 6px 24px rgba(108,53,222,0.6); }

/* ===== HISTORY FILTER ===== */
.filter-tabs {
display: flex;
gap: 6px;
flex-wrap: wrap;
margin-bottom: 14px;
}
.filter-tab {
padding: 6px 14px;
border-radius: 20px;
border: 1px solid var(–border);
background: transparent;
color: rgba(255,255,255,0.5);
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 12px;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}
.filter-tab.active {
background: linear-gradient(135deg, #6C35DE, #FF6B9D);
color: white;
border-color: transparent;
}
/* ===== SECTION TITLE ===== */
.section-title {
font-family: ‘Jua’, cursive;
font-size: 20px;
color: var(–gold);
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
}

/* ===== CARD ===== */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 20px;
padding: 20px;
margin-bottom: 16px;
backdrop-filter: blur(10px);
}

/* ===== ROULETTE ===== */
.roulette-wrap {
display: flex;
flex-direction: column;
align-items: center;
padding: 16px 0 24px;
}
.stock-badge {
background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.15));
border: 1px solid var(–gold);
border-radius: 20px;
padding: 10px 20px;
text-align: center;
margin-bottom: 20px;
width: 100%;
max-width: 300px;
}
.stock-badge .label { font-size: 11px; color: rgba(255,255,255,0.6); }
.stock-badge .value { font-family: ‘Jua’, cursive; font-size: 28px; color: var(–gold); }
.stock-badge .cost-info { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

.roulette-container {
position: relative;
width: 300px;
height: 300px;
margin-bottom: 8px;
}
.roulette-canvas {
width: 300px;
height: 300px;
border-radius: 50%;
box-shadow: 0 0 40px rgba(255,215,0,0.35), 0 0 0 6px var(–gold), 0 0 0 10px #8B6914;
display: block;
}
/* Pointer arrow at top */
.roulette-pointer {
position: absolute;
top: -18px;
left: 50%;
transform: translateX(-50%);
width: 0;
height: 0;
border-left: 14px solid transparent;
border-right: 14px solid transparent;
border-top: 32px solid var(–gold);
filter: drop-shadow(0 2px 6px rgba(255,165,0,0.8));
z-index: 10;
}
/* Center pin */
.roulette-center {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 28px; height: 28px;
background: radial-gradient(circle at 35% 35%, #fff, var(–gold));
border-radius: 50%;
border: 3px solid #8B6914;
box-shadow: 0 2px 8px rgba(0,0,0,0.5);
z-index: 10;
}

.btn-spin {
margin-top: 24px;
width: 260px;
padding: 16px;
background: linear-gradient(135deg, var(–gold), var(–gold2));
border: none;
border-radius: 50px;
color: #1a0a2e;
font-family: ‘Jua’, cursive;
font-size: 20px;
cursor: pointer;
letter-spacing: 3px;
transition: all 0.15s;
box-shadow: 0 4px 20px rgba(255,165,0,0.5);
}
.btn-spin:active { transform: scale(0.96); }
.btn-spin:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-spin:not(:disabled):hover { box-shadow: 0 6px 28px rgba(255,165,0,0.7); }

/* Prize legend */
.prize-legend {
width: 100%;
max-width: 300px;
margin-top: 20px;
}
.legend-item {
display: flex;
align-items: center;
gap: 10px;
padding: 8px 12px;
border-radius: 10px;
margin-bottom: 6px;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.08);
}
.legend-color {
width: 14px; height: 14px;
border-radius: 4px;
flex-shrink: 0;
}
.legend-name { flex: 1; font-size: 13px; font-weight: 700; }
.legend-prob { font-size: 12px; color: var(–gold); font-family: ‘Jua’, cursive; }
/* ===== MODE TOGGLE ===== */
.mode-toggle {
display: flex;
background: rgba(0,0,0,0.3);
border: 1px solid var(–border);
border-radius: 50px;
padding: 4px;
margin-bottom: 20px;
gap: 4px;
}
.mode-btn {
padding: 8px 22px;
border-radius: 50px;
border: none;
background: transparent;
color: rgba(255,255,255,0.5);
font-family: ‘Jua’, cursive;
font-size: 15px;
cursor: pointer;
transition: all 0.25s;
letter-spacing: 1px;
white-space: nowrap;
}
.mode-btn.active {
background: linear-gradient(135deg, var(–purple), var(–pink));
color: white;
box-shadow: 0 2px 12px rgba(108,53,222,0.5);
}

/* ===== GACHA MACHINE (slot) ===== */
.gacha-machine-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; }
.machine-body {
width: 240px;
background: linear-gradient(160deg, #2d1b69, #1a0a2e);
border: 3px solid var(–gold);
border-radius: 24px;
padding: 16px;
box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(108,53,222,0.3);
position: relative;
margin-bottom: 20px;
}
.machine-screen {
background: #000;
border: 2px solid var(–gold2);
border-radius: 16px;
height: 140px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 14px;
overflow: hidden;
}
.screen-idle { font-size: 50px; animation: float 2s ease-in-out infinite; }
.screen-result { font-size: 60px; animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
.screen-spinning { animation: spin-emoji 0.15s linear infinite; font-size: 50px; }
@keyframes spin-emoji { 0%{transform:rotateY(0)} 100%{transform:rotateY(360deg)} }
.machine-label {
text-align: center;
font-family: ‘Jua’, cursive;
font-size: 13px;
color: var(–gold);
margin-bottom: 10px;
letter-spacing: 1px;
}
.machine-ball {
width: 50px; height: 50px;
background: radial-gradient(circle at 35% 35%, #ff6b9d, #6c35de);
border-radius: 50%;
margin: 0 auto 10px;
border: 2px solid rgba(255,255,255,0.3);
box-shadow: 0 4px 12px rgba(108,53,222,0.5);
}
.btn-gacha {
width: 100%;
padding: 14px;
background: linear-gradient(135deg, var(–gold), var(–gold2));
border: none;
border-radius: 12px;
color: #1a0a2e;
font-family: ‘Jua’, cursive;
font-size: 18px;
cursor: pointer;
letter-spacing: 2px;
transition: all 0.15s;
box-shadow: 0 4px 16px rgba(255,165,0,0.4);
}
.btn-gacha:active { transform: scale(0.95); }
.btn-gacha:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-gacha:not(:disabled):hover { box-shadow: 0 6px 24px rgba(255,165,0,0.6); }
@keyframes shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-5deg)} 40%{transform:rotate(5deg)} 60%{transform:rotate(-3deg)} 80%{transform:rotate(3deg)} }
.machine-shake { animation: shake 0.5s ease; }

/* ===== RESULT MODAL ===== */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
z-index: 200;
align-items: center;
justify-content: center;
backdrop-filter: blur(8px);
}
.modal-overlay.active { display: flex; }
.modal {
background: linear-gradient(160deg, #2d1b69, #1a0a2e);
border: 2px solid var(–gold);
border-radius: 28px;
padding: 40px 32px;
text-align: center;
max-width: 320px;
width: 90%;
animation: modalIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
box-shadow: 0 0 60px rgba(255,215,0,0.3);
}
@keyframes modalIn { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
.modal-emoji { font-size: 80px; margin-bottom: 12px; display: block; animation: bounceIn 0.6s 0.2s both; }
@keyframes bounceIn { 0%{transform:scale(0) rotate(-20deg)} 70%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
.modal-prize { font-family: ‘Jua’, cursive; font-size: 32px; color: var(–gold); margin-bottom: 8px; }
.modal-msg { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
.confetti { position: absolute; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }

/* ===== MEMBERS LIST ===== */
.member-item {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 16px;
background: rgba(255,255,255,0.05);
border: 1px solid var(–border);
border-radius: 14px;
margin-bottom: 8px;
transition: background 0.2s;
}
.member-avatar {
width: 40px; height: 40px;
background: linear-gradient(135deg, var(–purple), var(–pink));
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Jua’, cursive;
font-size: 16px;
flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name { font-weight: 700; font-size: 15px; }
.member-stock { font-size: 12px; color: var(–gold); }
.member-actions { display: flex; gap: 6px; }
.btn-sm {
padding: 6px 12px;
border-radius: 8px;
border: none;
font-size: 12px;
font-family: ‘Noto Sans KR’, sans-serif;
cursor: pointer;
transition: all 0.15s;
}
.btn-sm:active { transform: scale(0.95); }
.btn-add { background: rgba(0,245,255,0.15); color: var(–cyan); border: 1px solid rgba(0,245,255,0.3); }
.btn-del { background: rgba(255,80,80,0.15); color: #ff8080; border: 1px solid rgba(255,80,80,0.3); }
.btn-edit { background: rgba(255,215,0,0.15); color: var(–gold); border: 1px solid rgba(255,215,0,0.3); }

/* ===== PRIZES ===== */
.prize-item {
display: flex;
align-items: center;
gap: 14px;
padding: 14px 16px;
background: rgba(255,255,255,0.05);
border: 1px solid var(–border);
border-radius: 14px;
margin-bottom: 8px;
}
.prize-emoji { font-size: 32px; }
.prize-info { flex: 1; }
.prize-name { font-weight: 700; font-size: 15px; }
.prize-prob { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.prob-bar {
height: 4px;
background: rgba(255,255,255,0.1);
border-radius: 2px;
margin-top: 6px;
overflow: hidden;
}
.prob-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(–purple), var(–pink)); transition: width 0.4s; }

/* ===== HISTORY ===== */
.history-item {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 14px;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
border-radius: 12px;
margin-bottom: 6px;
}
.history-emoji { font-size: 28px; }
.history-info { flex: 1; }
.history-name { font-size: 14px; font-weight: 700; }
.history-prize { font-size: 12px; color: var(–gold); }
.history-time { font-size: 10px; color: rgba(255,255,255,0.3); }

/* ===== STOCK INPUT ===== */
.stock-input-row {
display: flex;
align-items: center;
gap: 10px;
margin-top: 8px;
}
.stock-input-row input {
flex: 1;
padding: 10px 14px;
background: rgba(255,255,255,0.08);
border: 1px solid var(–border);
border-radius: 10px;
color: white;
font-size: 15px;
font-family: ‘Noto Sans KR’, sans-serif;
outline: none;
}
.stock-input-row input:focus { border-color: var(–purple); }
.btn-confirm {
padding: 10px 16px;
background: linear-gradient(135deg, var(–purple), var(–pink));
border: none;
border-radius: 10px;
color: white;
font-family: ‘Jua’, cursive;
font-size: 14px;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
}
.btn-confirm:active { transform: scale(0.95); }

/* ===== PRIZE BADGES IN HEADER ===== */
.header-prizes {
font-size: 18px;
letter-spacing: 2px;
max-width: 140px;
overflow: hidden;
white-space: nowrap;
text-overflow: ellipsis;
line-height: 1.2;
}
.header-prizes-label {
font-size: 9px;
color: rgba(255,255,255,0.5);
display: block;
margin-bottom: 1px;
}
/* ===== SETTINGS ===== */
.setting-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 0;
border-bottom: 1px solid var(–border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 14px; color: rgba(255,255,255,0.8); }
.setting-value { font-family: ‘Jua’, cursive; font-size: 18px; color: var(–gold); }

/* ===== TOAST ===== */
.toast {
position: fixed;
bottom: 90px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: rgba(30,20,60,0.95);
border: 1px solid var(–purple);
color: white;
padding: 12px 24px;
border-radius: 24px;
font-size: 14px;
z-index: 300;
opacity: 0;
transition: all 0.3s;
pointer-events: none;
white-space: nowrap;
backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== EMPTY STATE ===== */
.empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ===== LOADING ===== */
.loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
.spinner {
width: 40px; height: 40px;
border: 3px solid rgba(255,255,255,0.1);
border-top-color: var(–purple);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin: 0 auto 16px;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ===== PRIZE EDIT MODAL ===== */
.prize-modal {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
z-index: 200;
align-items: flex-end;
justify-content: center;
backdrop-filter: blur(6px);
}
.prize-modal.active { display: flex; }
.prize-modal-inner {
background: linear-gradient(160deg, #2d1b69, #1a0a2e);
border: 1px solid var(–border);
border-radius: 24px 24px 0 0;
padding: 28px 24px 40px;
width: 100%;
max-width: 480px;
animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.prize-modal-title { font-family: ‘Jua’, cursive; font-size: 20px; color: var(–gold); margin-bottom: 20px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–purple); border-radius: 2px; }

</style>
</head>
<body>

<!-- Stars background -->

<div class="stars" id="stars"></div>

<!-- Toast -->

<div class="toast" id="toast"></div>

<!-- Login Page -->

<div id="loginPage" class="login-wrap" style="background-color:#1a0a2e;position:relative;z-index:1;">
  <div class="login-logo">🎡</div>
  <div class="login-title">(주) 떠리원</div>
  <div class="login-sub">가챠뽑기 🎡</div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('member')">👤 참여자</button>

<script>
// ===== Firebase Config =====
const DB_URL = 'https://gacha-31-default-rtdb.firebaseio.com';

async function fbGet(path) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`);
    return await r.json();
  } catch(e) { return null; }
}

async function fbSet(path, data) {
  try {
    await fetch(`${DB_URL}/${path}.json`, {
      method: 'PUT',
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function fbPush(path, data) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    return await r.json();
  } catch(e) { return null; }
}

async function fbDelete(path) {
  try {
    await fetch(`${DB_URL}/${path}.json`, { method: 'DELETE' });
  } catch(e) {}
}

// ===== State =====
let currentUser = null; // { name, role, key }
let loginTab = 'member';
let allMembers = {};
let allPrizes = {};
let costPerRoll = 10;


// ===== Stars =====
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';

      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*3}s;
    `;
    container.appendChild(s);
  }
})();

// ===== Init =====
async function init() {
  const members = await fbGet('members');
  allMembers = members || {};

  const prizes = await fbGet('prizes');
  allPrizes = prizes;
  if (!prizes) {
    // default prizes
    allPrizes = {
      p1: { name: '연차', emoji: '🏖️', prob: 10 },
      p2: { name: '투피드', emoji: '🍔', prob: 40 },
      p3: { name: '출근확인증', emoji: '📋', prob: 50 }
    };
    await fbSet('prizes', allPrizes);
  }

  const cost = await fbGet('costPerRoll');
  costPerRoll = (cost !== null && cost !== undefined) ? cost : 10;

  // populate member select
  populateMemberSelect();
}

function populateMemberSelect() {

}

// ===== Login =====
function switchLoginTab(tab) {
  loginTab = tab;
  document.querySelectorAll('.login-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='member') || (i===1 && tab==='admin'));
  });
  document.getElementById('memberLoginForm').style.display = tab === 'member' ? '' : 'none';
  document.getElementById('adminLoginForm').style.display = tab === 'admin' ? '' : 'none';
}

async function doLogin() {
  if (loginTab === 'admin') {
    const pw = document.getElementById('adminPassword').value;
    if (pw !== 'admin1234') { showToast('❌ 비밀번호가 틀렸습니다'); return; }
    currentUser = { name: '관리자', role: 'admin', key: null };
    enterApp();
  } else {
    const inputName = document.getElementById('memberNameInput').value.trim();
    if (!inputName) { showToast('이름을 입력해주세요'); return; }

    // Firebase에서 최신 멤버 목록 가져와서 매칭
    const members = await fbGet('members');
    allMembers = members || {};
    const match = Object.entries(allMembers).find(([k, m]) =>
      m.name.trim() === inputName
    );

    if (!match) {
      showToast('❌ 등록되지 않은 이름입니다');
      return;
    }
    const [key, memberData] = match;
    currentUser = { name: memberData.name, role: 'member', key };
    enterApp();
  }
}

function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').style.display = '';
  document.getElementById('headerName').textContent = currentUser.name;
  document.getElementById('headerRole').textContent = currentUser.role === 'admin' ? '관리자' : '참여자';

  const isAdmin = currentUser.role === 'admin';
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });

  // Show prize badge for members
  if (!isAdmin) {
    document.getElementById('headerPrizesWrap').style.display = '';
    refreshHeaderPrizes();
  } else {
    document.getElementById('headerPrizesWrap').style.display = 'none';
  }

  showPage('gacha');
}

async function refreshHeaderPrizes() {
  if (!currentUser || currentUser.role === 'admin') return;
  const el = document.getElementById('headerPrizes');

  // memberPrizes 없으면 history에서 자동 마이그레이션
  let prizes = await fbGet(`memberPrizes/${currentUser.key}`);
  if (!prizes || prizes.length === 0) {
    const history = await fbGet('history');
    if (history) {
      const myItems = Object.values(history)
        .filter(h => h.name === currentUser.name)
        .map(h => ({ emoji: h.emoji, name: h.prize, time: h.time || 0 }));
      if (myItems.length > 0) {
        await fbSet(`memberPrizes/${currentUser.key}`, myItems);
        prizes = myItems;
      }
    }
  }

  if (!prizes || prizes.length === 0) {
    el.textContent = '없음';
  } else {
    const counts = {};
    prizes.forEach(p => {
      const key = p.emoji + '|' + p.name;
      if (!counts[key]) counts[key] = { emoji: p.emoji, name: p.name, count: 0 };
      counts[key].count++;
    });
    el.textContent = Object.values(counts).map(p => `${p.emoji}×${p.count}`).join('  ');
  }
}

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

// ===== Roulette Drawing =====
const SLICE_COLORS = [
  '#6C35DE','#FF6B9D','#00C9A7','#F7B731','#FC5C65',
  '#45AAF2','#A55EEA','#26DE81','#FD9644','#2BCBBA'
];

let rouletteAngle = 0;
let isSpinning = false;
let currentMode = 'roulette'; // 'roulette' | 'gacha'
let slotSpinInterval = null;

function drawRoulette() {
  const canvas = document.getElementById('rouletteCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, r = W / 2 - 2;

  ctx.clearRect(0, 0, W, H);

  const prizes = Object.values(allPrizes);
  const keys = Object.keys(allPrizes);
  if (!prizes.length) return;

  const total = prizes.reduce((s, p) => s + (p.prob || 0), 0) || 100;
  let startAngle = (rouletteAngle - 90) * Math.PI / 180;

  prizes.forEach((p, i) => {
    const sliceAngle = ((p.prob || 0) / total) * 2 * Math.PI;
    const endAngle = startAngle + sliceAngle;
    const color = SLICE_COLORS[i % SLICE_COLORS.length];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Slice border
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label (emoji + name)
    const midAngle = startAngle + sliceAngle / 2;
    const labelR = r * 0.62;
    const lx = cx + labelR * Math.cos(midAngle);
    const ly = cy + labelR * Math.sin(midAngle);

    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(midAngle + Math.PI / 2);

    // Emoji
    ctx.font = sliceAngle > 0.4 ? '20px serif' : '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji || '🎁', 0, sliceAngle > 0.5 ? -10 : 0);

    // Name text (only if slice is big enough)
    if (sliceAngle > 0.35) {
      ctx.font = 'bold 11px "Noto Sans KR", sans-serif';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 3;
      ctx.fillText(p.name || '', 0, 10);
      ctx.shadowBlur = 0;
    }
    ctx.restore();

    startAngle = endAngle;
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,215,0,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function renderPrizeLegend() {
  const legend = document.getElementById('prizeLegend');
  if (!legend) return;
  const prizes = Object.values(allPrizes);
  const total = prizes.reduce((s, p) => s + (p.prob || 0), 0) || 100;
  legend.innerHTML = prizes.map((p, i) => `
    <div class="legend-item">
      <div class="legend-color" style="background:${SLICE_COLORS[i % SLICE_COLORS.length]}"></div>
      <span style="font-size:18px">${p.emoji}</span>
      <span class="legend-name">${escHtml(p.name)}</span>
      <span class="legend-prob">${p.prob}%</span>
    </div>
  `).join('');
}

// ===== Mode Switch =====
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeRouletteWrap').style.display = mode === 'roulette' ? '' : 'none';
  document.getElementById('modeGachaWrap').style.display = mode === 'gacha' ? '' : 'none';
  document.getElementById('modeRoulette').classList.toggle('active', mode === 'roulette');
  document.getElementById('modeGacha').classList.toggle('active', mode === 'gacha');
  if (mode === 'roulette') {
    drawRoulette();
    renderPrizeLegend();
  } else {
    // reset slot screen
    const sc = document.getElementById('screenContent');
    sc.className = 'screen-idle';
    sc.textContent = '🎰';
  }
}

// ===== Gacha Page =====
async function refreshGachaPage() {
  if (!currentUser) return;
  const cost = await fbGet('costPerRoll');
  costPerRoll = (cost !== null && cost !== undefined) ? cost : 10;
  document.getElementById('costInfo').textContent = `1판 = ${costPerRoll}주`;

  const prizes = await fbGet('prizes');
  allPrizes = prizes || allPrizes;

  if (currentUser.role === 'member') {
    const member = await fbGet(`members/${currentUser.key}`);
    const stock = member ? (member.stock || 0) : 0;
    document.getElementById('myStockDisplay').textContent = `${stock} 주`;
    const noStock = stock < costPerRoll;
    document.getElementById('spinBtn').disabled = noStock;
    document.getElementById('gachaSlotBtn').disabled = noStock;
  } else {
    document.getElementById('myStockDisplay').textContent = '∞ 주';
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('gachaSlotBtn').disabled = false;
  }

  drawRoulette();
  renderPrizeLegend();
}

async function deductStockAndCheck() {
  if (currentUser.role === 'member') {
    const member = await fbGet(`members/${currentUser.key}`);
    const stock = member ? (member.stock || 0) : 0;
    if (stock < costPerRoll) {
      showToast('주식이 부족합니다!');
      return false;
    }
    await fbSet(`members/${currentUser.key}/stock`, stock - costPerRoll);
  }
  return true;
}

function refreshStockDisplay(enableBtns) {
  if (currentUser.role === 'member') {
    fbGet(`members/${currentUser.key}`).then(m => {
      const s = m ? (m.stock || 0) : 0;

      const noStock = s < costPerRoll;

  } else if (enableBtns) {

async function showPrizeModal(prize) {
  document.getElementById('modalEmoji').textContent = prize.emoji;
  document.getElementById('modalPrize').textContent = prize.name;
  document.getElementById('modalMsg').textContent = `${currentUser.name}님 축하합니다! 🎉`;
  document.getElementById('resultModal').classList.add('active');

  // Save prize to member's prize list (members only)
  if (currentUser && currentUser.role === 'member') {
    const current = await fbGet(`memberPrizes/${currentUser.key}`) || [];
    current.push({ emoji: prize.emoji, name: prize.name, time: Date.now() });
    await fbSet(`memberPrizes/${currentUser.key}`, current);
    refreshHeaderPrizes();
  }
}

// ===== ROULETTE SPIN =====
async function doSpin() {
  if (isSpinning) return;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  isSpinning = true;

  const ok = await deductStockAndCheck();
  if (!ok) { btn.disabled = false; isSpinning = false; return; }

  const prize = drawPrize();
  const prizes = Object.values(allPrizes);
  const total = prizes.reduce((s, p) => s + (p.prob || 0), 0) || 100;
  let cumulative = 0, prizeStart = 0, prizeEnd = 0;
  for (const p of prizes) {
    const sliceDeg = (p.prob / total) * 360;
    if (p.name === prize.name && p.emoji === prize.emoji) {
      prizeEnd = cumulative + sliceDeg;
      prizeStart = cumulative;
      break;
    }
    cumulative += sliceDeg;
  }
  const prizeMid = prizeStart + (prizeEnd - prizeStart) / 2;
  const extraSpins = 5 + Math.floor(Math.random() * 4);
  const jitter = (Math.random() - 0.5) * (prizeEnd - prizeStart) * 0.6;
  const targetAngle = rouletteAngle - (rouletteAngle % 360) + extraSpins * 360 + (360 - prizeMid) + jitter;
  const duration = 4000 + Math.random() * 1000;
  const startAngle = rouletteAngle;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    rouletteAngle = startAngle + (targetAngle - startAngle) * easeOut(progress);
    drawRoulette();
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      rouletteAngle = targetAngle % 360;
      drawRoulette();
      isSpinning = false;
      fbPush('history', { name: currentUser.name, prize: prize.name, emoji: prize.emoji, time: Date.now() });
      setTimeout(() => showPrizeModal(prize), 300);
      refreshStockDisplay(true);
    }
  }
  requestAnimationFrame(animate);
}

// ===== SLOT MACHINE =====
async function doGachaSlot() {
  const btn = document.getElementById('gachaSlotBtn');
  btn.disabled = true;

  const ok = await deductStockAndCheck();
  if (!ok) { btn.disabled = false; return; }

  const screen = document.getElementById('screenContent');
  const machine = document.getElementById('machineBody');
  machine.classList.add('machine-shake');
  setTimeout(() => machine.classList.remove('machine-shake'), 500);

  screen.className = 'screen-spinning';
  const emojiList = Object.values(allPrizes).map(p => p.emoji);
  let i = 0;
  slotSpinInterval = setInterval(() => {
    screen.textContent = emojiList[i % emojiList.length];
    i++;
  }, 100);

  const prize = drawPrize();

  setTimeout(async () => {
    clearInterval(slotSpinInterval);
    screen.className = 'screen-result';
    screen.textContent = prize.emoji;
    await fbPush('history', { name: currentUser.name, prize: prize.name, emoji: prize.emoji, time: Date.now() });
    showPrizeModal(prize);
    refreshStockDisplay(true);
  }, 1800);
}

function drawPrize() {
  const prizes = Object.values(allPrizes);
  const total = prizes.reduce((s, p) => s + (p.prob || 0), 0);
  let rand = Math.random() * total;
  for (const p of prizes) {
    rand -= (p.prob || 0);
    if (rand <= 0) return p;
  }
  return prizes[prizes.length - 1];
}

function closeModal() {
  document.getElementById('resultModal').classList.remove('active');
  // Reset slot screen when closing
  const sc = document.getElementById('screenContent');
  if (sc) { sc.className = 'screen-idle'; sc.textContent = '🎰'; }
}

// ===== History =====
let historyFilter = '전체'; // current filter
let allHistoryItems = []; // cache

async function loadHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const history = await fbGet('history');

  const isAdmin = currentUser && currentUser.role === 'admin';

  if (!history) {
    document.getElementById('historyFilterTabs').innerHTML = '';
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>기록이 없습니다</div>';
    return;
  }

  let items = Object.entries(history)
    .map(([k, v]) => v)
    .sort((a, b) => (b.time || 0) - (a.time || 0));

  if (!isAdmin) {
    items = items.filter(item => item.name === currentUser.name);
    document.getElementById('historyFilterTabs').innerHTML = '';
  } else {
    // Build member filter tabs
    const names = ['전체', ...new Set(items.map(i => i.name))];
    const tabsEl = document.getElementById('historyFilterTabs');
    tabsEl.innerHTML = names.map(name => `
      <button class="filter-tab ${name === historyFilter ? 'active' : ''}"
        onclick="setHistoryFilter('${name}')">${name}</button>
    `).join('');
  }

  allHistoryItems = items;
  renderHistoryList(isAdmin);
}

function setHistoryFilter(name) {
  historyFilter = name;
  const isAdmin = currentUser && currentUser.role === 'admin';
  // update tab active state
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === name);
  });
  renderHistoryList(isAdmin);
}

function renderHistoryList(isAdmin) {
  const list = document.getElementById('historyList');
  let items = allHistoryItems;

  if (isAdmin && historyFilter !== '전체') {
    items = items.filter(i => i.name === historyFilter);
  }

  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>기록이 없습니다</div>';
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="history-item">
      <div class="history-emoji">${item.emoji}</div>
      <div class="history-info">
        ${isAdmin ? `<div class="history-name">${escHtml(item.name)}</div>` : ''}
        <div class="history-prize" style="${isAdmin ? '' : 'font-size:15px;font-weight:700;color:var(--gold)'}">
          ${escHtml(item.prize)}
        </div>
      </div>
      <div class="history-time">${formatTime(item.time)}</div>
    </div>
  `).join('');
}

async function addMember() {
  const name = document.getElementById('newMemberName').value.trim();
  if (!name) { showToast('이름을 입력하세요'); return; }
  // check duplicate
  const exists = Object.values(allMembers).some(m => m.name === name);
  if (exists) { showToast('이미 존재하는 이름입니다'); return; }
  await fbPush('members', { name, stock: 0 });
  document.getElementById('newMemberName').value = '';
  showToast(`✅ ${name} 추가됨`);
  loadMembers();
}

async function deleteMember(key) {
  const m = allMembers[key];
  if (!m) return;
  if (!confirm(`'${m.name}' 멤버를 삭제하시겠습니까?`)) return;
  await fbDelete(`members/${key}`);
  showToast('🗑️ 삭제됨');
  loadMembers();
}

// ===== Prizes =====
async function loadPrizes() {
  const list = document.getElementById('prizeList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const prizes = await fbGet('prizes');
  allPrizes = prizes || {};

  updateTotalProb();

  if (!prizes || Object.keys(prizes).length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎁</div>경품이 없습니다</div>';
    return;
  }

  list.innerHTML = Object.entries(prizes).map(([k, p]) => `
    <div class="prize-item">
      <div class="prize-emoji">${p.emoji}</div>
      <div class="prize-info">
        <div class="prize-name">${escHtml(p.name)}</div>
        <div class="prize-prob">${p.prob}%</div>
        <div class="prob-bar"><div class="prob-fill" style="width:${p.prob}%"></div></div>
      </div>
      <div class="member-actions">
        <button class="btn-sm btn-edit" onclick="openEditPrize('${k}')">수정</button>
        <button class="btn-sm btn-del" onclick="deletePrize('${k}')">삭제</button>
      </div>
    </div>
  `).join('');
  // Redraw roulette preview on prizes page
  drawRoulettePreview();
}

function drawRoulettePreview() {
  // Redraw main roulette if currently on gacha page
  drawRoulette();
  renderPrizeLegend();
}

function updateTotalProb() {
  const total = Object.values(allPrizes).reduce((s, p) => s + (p.prob || 0), 0);
  const el = document.getElementById('totalProb');
  el.textContent = `합계: ${total}%`;
  el.style.color = total === 100 ? '#00ff88' : total > 100 ? '#ff4444' : 'var(--gold)';
}

function openAddPrize() {
  document.getElementById('prizeModalTitle').textContent = '경품 추가';
  document.getElementById('editPrizeKey').value = '';
  document.getElementById('editPrizeName').value = '';
  document.getElementById('editPrizeEmoji').value = '';
  document.getElementById('editPrizeProb').value = '';
  document.getElementById('prizeModal').classList.add('active');
}

function openEditPrize(key) {
  const p = allPrizes[key];
  if (!p) return;
  document.getElementById('prizeModalTitle').textContent = '경품 수정';
  document.getElementById('editPrizeKey').value = key;
  document.getElementById('editPrizeName').value = p.name;
  document.getElementById('editPrizeEmoji').value = p.emoji;
  document.getElementById('editPrizeProb').value = p.prob;
  document.getElementById('prizeModal').classList.add('active');
}

function closePrizeModal() {
  document.getElementById('prizeModal').classList.remove('active');
}

async function savePrize() {
  const key = document.getElementById('editPrizeKey').value;
  const name = document.getElementById('editPrizeName').value.trim();
  const emoji = document.getElementById('editPrizeEmoji').value.trim();
  const prob = parseFloat(document.getElementById('editPrizeProb').value);
  if (!name || !emoji || isNaN(prob)) { showToast('모든 항목을 입력하세요'); return; }
  if (prob < 0 || prob > 100) { showToast('확률은 0~100 사이'); return; }

  if (key) {
    await fbSet(`prizes/${key}`, { name, emoji, prob });
  } else {
    await fbPush('prizes', { name, emoji, prob });
  }
  closePrizeModal();
  showToast('✅ 저장됨');
  loadPrizes();
}

async function deletePrize(key) {
  if (!confirm('경품을 삭제하시겠습니까?')) return;
  await fbDelete(`prizes/${key}`);
  showToast('🗑️ 삭제됨');
  loadPrizes();
}

// ===== Settings =====
async function loadSettings() {
  const cost = await fbGet('costPerRoll');
  costPerRoll = (cost !== null && cost !== undefined) ? cost : 10;
  document.getElementById('costDisplay').textContent = `${costPerRoll}주`;
  document.getElementById('newCostInput').value = costPerRoll;
  populateGiveStockSelect();
  populateManagePrizeSelect();
}

function populateManagePrizeSelect() {
  const sel = document.getElementById('managePrizeMember');
  if (!sel) return;
  sel.innerHTML = '<option value="">멤버를 선택하세요</option>';
  Object.entries(allMembers).forEach(([k, m]) => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = m.name;
    sel.appendChild(opt);
  });
}

async function loadMemberPrizes() {
  const key = document.getElementById('managePrizeMember').value;
  const container = document.getElementById('memberPrizeList');
  if (!key) { container.innerHTML = ''; return; }

  const prizes = await fbGet(`memberPrizes/${key}`);
  if (!prizes || prizes.length === 0) {
    container.innerHTML = '<div style="font-size:13px;color:rgba(255,255,255,0.4);padding:8px 0">보유 경품 없음</div>';
    return;
  }
  container.innerHTML = prizes.map((p, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:24px">${p.emoji}</span>
      <span style="flex:1;font-size:14px">${escHtml(p.name)}</span>
      <button class="btn-sm btn-del" onclick="removeMemberPrize('${key}', ${i})">차감</button>
    </div>
  `).join('');
}

async function addMemberPrize() {
  const key = document.getElementById('managePrizeMember').value;
  const emoji = document.getElementById('addPrizeEmoji').value.trim();
  const name = document.getElementById('addPrizeName').value.trim();
  if (!key) { showToast('멤버를 선택하세요'); return; }
  if (!emoji || !name) { showToast('이모지와 경품명을 입력하세요'); return; }

  const current = await fbGet(`memberPrizes/${key}`) || [];
  current.push({ emoji, name, time: Date.now() });
  await fbSet(`memberPrizes/${key}`, current);

  document.getElementById('addPrizeEmoji').value = '';
  document.getElementById('addPrizeName').value = '';
  showToast(`✅ ${allMembers[key].name}에게 ${emoji} ${name} 지급!`);
  loadMemberPrizes();
}

async function removeMemberPrize(key, index) {
  const current = await fbGet(`memberPrizes/${key}`) || [];
  current.splice(index, 1);
  await fbSet(`memberPrizes/${key}`, current);
  showToast('🗑️ 경품 차감됨');
  loadMemberPrizes();
}

function populateGiveStockSelect() {
  const sel = document.getElementById('giveStockMember');
  if (!sel) return;
  sel.innerHTML = '<option value="">멤버를 선택하세요</option>';
  Object.entries(allMembers).forEach(([k, m]) => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = `${m.name} (${m.stock || 0}주)`;
    sel.appendChild(opt);
  });
}

async function saveCost() {
  const val = parseInt(document.getElementById('newCostInput').value);
  if (isNaN(val) || val < 1) { showToast('올바른 숫자를 입력하세요'); return; }
  costPerRoll = val;
  await fbSet('costPerRoll', val);
  document.getElementById('costDisplay').textContent = `${val}주`;
  showToast(`✅ 1판 = ${val}주로 설정됨`);
}

async function giveStock() {
  const memberKey = document.getElementById('giveStockMember').value;
  const amount = parseInt(document.getElementById('giveStockAmount').value);
  if (!memberKey) { showToast('멤버를 선택하세요'); return; }
  if (isNaN(amount) || amount < 1 || amount > 100) { showToast('1~100 사이의 숫자를 입력하세요'); return; }
  
  const member = await fbGet(`members/${memberKey}`);
  const current = member ? (member.stock || 0) : 0;
  const newStock = current + amount;
  await fbSet(`members/${memberKey}/stock`, newStock);
  
  // refresh members data
  allMembers = (await fbGet('members')) || {};
  document.getElementById('giveStockAmount').value = '';
  showToast(`✅ ${allMembers[memberKey].name}에게 ${amount}주 지급! (총 ${newStock}주)`);
  populateGiveStockSelect();
}

// ===== Helpers =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const mo = d.getMonth()+1;
  const da = d.getDate();
  const h = d.getHours().toString().padStart(2,'0');
  const mi = d.getMinutes().toString().padStart(2,'0');
  return `${mo}/${da} ${h}:${mi}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
